<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg0);color:var(--t0);font-family:'Syne',system-ui,sans-serif;transition:background .25s,color .25s;overflow-x:hidden}

/* ══ C2 THEME SYSTEM — 3 themes ══ */
/* DEFAULT: Deep space purple */
:root,[data-theme="default"]{
  --bg0:#07080f;--bg1:#0d0e1c;--bg2:#111224;--bg3:#181930;
  --border:rgba(124,111,255,.18);--border2:rgba(124,111,255,.32);
  --t0:#f4f4ff;--t1:#cccce8;--t2:#9999cc;
  --acc:#7c6fff;--acc2:#3ecfef;--ok:#3dffa0;--warn:#ffcc44;--err:#ff5533;
  --acc-glow:rgba(124,111,255,.5);
  --header-bg:rgba(4,4,18,.88);
  --r:10px;--r2:14px;--trans:.18s cubic-bezier(.4,0,.2,1);
}
/* DARK: Absolute black — high contrast, clean */
[data-theme="dark"]{
  --bg0:#000000;--bg1:#0a0a0a;--bg2:#111111;--bg3:#181818;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --t0:#ffffff;--t1:#ccccdd;--t2:#8888a0;
  --acc:#7c6fff;--acc2:#3ecfef;--ok:#3dffa0;--warn:#ffcc44;--err:#ff5533;
  --acc-glow:rgba(124,111,255,.45);
  --header-bg:rgba(0,0,0,.96);
  --r:10px;--r2:14px;--trans:.18s cubic-bezier(.4,0,.2,1);
}
/* LIGHT: Clean white with rich contrast */
[data-theme="light"]{
  --bg0:#ffffff;--bg1:#f0f0f5;--bg2:#f4f4f8;--bg3:#e8e8f0;
  --border:#d0d0e0;--border2:#b0b0cc;
  --t0:#0a0a1a;--t1:#333355;--t2:#666688;
  --acc:#4455ee;--acc2:#0099bb;--ok:#009944;--warn:#bb7700;--err:#cc2200;
  --acc-glow:rgba(68,85,238,.25);
  --header-bg:rgba(255,255,255,.97);
  --r:10px;--r2:14px;--trans:.18s cubic-bezier(.4,0,.2,1);
}

button{font-family:var(--font,inherit);cursor:pointer;border:none;outline:none}
button:focus-visible{outline:2px solid var(--acc);outline-offset:2px}

@keyframes lcPop{from{transform:scale(.78);opacity:0}to{transform:scale(1);opacity:1}}

/* Ambient background canvas — exact C2 */

/* Default theme — subtle text glow for readability on purple bg */

<body>
<canvas id="chromix-bg"></canvas>
<div id="root"></div>
<script>
(function(){
  const canvas = document.getElementById('chromix-bg');
  const ctx = canvas.getContext('2d');

  // Mouse tracking with smooth lerp
  let mx = window.innerWidth  * 0.5;
  let my = window.innerHeight * 0.5;
  let tx = mx, ty = my;  // lerp targets

  window.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
  window.addEventListener('touchmove', e => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, {passive:true});

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let time = 0;
  function animate() {
    time += 0.001;

    // Smooth lerp toward cursor (only active on default theme)
    const theme = document.documentElement.getAttribute('data-theme') || 'default';
    const isDefault = theme === 'default';

    if (isDefault) {
      mx += (tx - mx) * 0.045;
      my += (ty - my) * 0.045;
    }

    // Fade layer — slightly stronger than C2 to show motion better
    ctx.fillStyle = 'rgba(7, 8, 15, 0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!isDefault) {
      requestAnimationFrame(animate);
      return;
    }

    const W = canvas.width, H = canvas.height;

    // 1. Cursor aura — large soft glow that follows mouse
    const cursorGrad = ctx.createRadialGradient(mx, my, 0, mx, my, 340);
    cursorGrad.addColorStop(0,   'rgba(124, 111, 255, 0.13)');
    cursorGrad.addColorStop(0.4, 'rgba(62, 207, 239, 0.06)');
    cursorGrad.addColorStop(1,   'rgba(124, 111, 255, 0)');
    ctx.fillStyle = cursorGrad;
    ctx.fillRect(0, 0, W, H);

    // 2. Cursor sparkle — tight bright core
    const sparkGrad = ctx.createRadialGradient(mx, my, 0, mx, my, 80);
    sparkGrad.addColorStop(0,   'rgba(200, 190, 255, 0.22)');
    sparkGrad.addColorStop(0.5, 'rgba(124, 111, 255, 0.08)');
    sparkGrad.addColorStop(1,   'rgba(124, 111, 255, 0)');
    ctx.fillStyle = sparkGrad;
    ctx.fillRect(mx - 80, my - 80, 160, 160);

    // 3. Three ambient orbs (C2 original) — slightly influenced by cursor
    for (let i = 0; i < 3; i++) {
      const pull = 0.08; // how much orbs drift toward cursor
      const ox = (Math.sin(time + i) * W * 0.28) + W * 0.5 + (mx - W * 0.5) * pull;
      const oy = (Math.cos(time * 0.7 + i * 2) * H * 0.28) + H * 0.5 + (my - H * 0.5) * pull;
      const r  = 220 + Math.sin(time + i) * 90;
      const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
      const alpha = 0.07 + 0.015 * Math.sin(time * 1.3 + i); // gentle pulse
      grad.addColorStop(0, `rgba(124, 111, 255, ${alpha})`);
      grad.addColorStop(0.6, `rgba(62, 207, 239, ${alpha * 0.3})`);
      grad.addColorStop(1, 'rgba(124, 111, 255, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(ox - r, oy - r, r * 2, r * 2);
    }

    // 4. Trailing ripple lines that emanate from cursor
    const dist = Math.hypot(tx - mx, ty - my);
    if (dist > 2) {
      const lineGrad = ctx.createRadialGradient(mx, my, 0, mx, my, 120);
      lineGrad.addColorStop(0,   `rgba(124, 111, 255, ${Math.min(0.12, dist * 0.0008)})`);
      lineGrad.addColorStop(1,   'rgba(124, 111, 255, 0)');
      ctx.fillStyle = lineGrad;
      ctx.fillRect(mx - 120, my - 120, 240, 240);
    }

    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext, useReducer } = React;

// ═══════════════════════════════════════════════════════════════════
//  PURE COLOR MATH ENGINE (from ChromaLab v4 — untouched)
// ═══════════════════════════════════════════════════════════════════
const TAU = Math.PI * 2, DEG = Math.PI / 180;

function hslToRgb(h, s, l) {
  s/=100; l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs(((h/60)%2)-1)), m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x} else if(h<120){r=x;g=c} else if(h<180){g=c;b=x}
  else if(h<240){g=x;b=c} else if(h<300){r=x;b=c} else{r=c;b=x}
  return {r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};
}
function hsvToRgb(h,s,v){
  const c=v*s,x=c*(1-Math.abs(((h/60)%2)-1)),m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}
  else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
  return {r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};
}
function rgbToHex({r,g,b}){return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase()}
function hslToHex(h,s,l){return rgbToHex(hslToRgb(h,s,l))}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b}}
function hslToHsv(h,s,l){s/=100;l/=100;const v=l+s*Math.min(l,1-l);const sv=v<1e-10?0:2*(1-l/v);return{h,sv,v}}
function hsvToHsl(h,sv,v){const l=v*(1-sv/2);const sl=(l<1e-10||l>1-1e-10)?0:(v-l)/Math.min(l,1-l);return{h,s:Math.max(0,Math.min(100,sl*100)),l:Math.max(0,Math.min(100,l*100))}}
function linearizeChannel(v){v/=255;return v<=0.04045?v/12.92:Math.pow((v+0.055)/1.055,2.4)}
function rgbToLab({r,g,b}){
  const rl=linearizeChannel(r),gl=linearizeChannel(g),bl=linearizeChannel(b);
  const X=(rl*0.4124564+gl*0.3575761+bl*0.1804375)/0.95047;
  const Y=rl*0.2126729+gl*0.7151522+bl*0.0721750;
  const Z=(rl*0.0193339+gl*0.1191920+bl*0.9503041)/1.08883;
  const f=t=>t>0.008856?Math.cbrt(t):7.787*t+16/116;
  return{L:116*f(Y)-16,a:500*(f(X)-f(Y)),b:200*(f(Y)-f(Z))};
}
function deltaE2000(lab1,lab2){
  const{L:L1,a:a1,b:b1}=lab1,{L:L2,a:a2,b:b2}=lab2;
  const avgC=(Math.sqrt(a1**2+b1**2)+Math.sqrt(a2**2+b2**2))/2;
  const G=0.5*(1-Math.sqrt(avgC**7/(avgC**7+25**7)));
  const a1p=a1*(1+G),a2p=a2*(1+G);
  const C1p=Math.sqrt(a1p**2+b1**2),C2p=Math.sqrt(a2p**2+b2**2);
  let h1p=Math.atan2(b1,a1p)/DEG;if(h1p<0)h1p+=360;
  let h2p=Math.atan2(b2,a2p)/DEG;if(h2p<0)h2p+=360;
  const dLp=L2-L1,dCp=C2p-C1p;
  const dhp=Math.abs(h2p-h1p)<=180?h2p-h1p:h2p<=h1p?h2p-h1p+360:h2p-h1p-360;
  const dHp=2*Math.sqrt(C1p*C2p)*Math.sin(dhp*DEG/2);
  const avgLp=(L1+L2)/2,avgCp=(C1p+C2p)/2;
  const avghp=Math.abs(h1p-h2p)<=180?(h1p+h2p)/2:(h1p+h2p+(h1p+h2p<360?360:-360))/2;
  const T=1-0.17*Math.cos((avghp-30)*DEG)+0.24*Math.cos(2*avghp*DEG)+0.32*Math.cos((3*avghp+6)*DEG)-0.20*Math.cos((4*avghp-63)*DEG);
  const SL=1+0.015*(avgLp-50)**2/Math.sqrt(20+(avgLp-50)**2);
  const SC=1+0.045*avgCp,SH=1+0.015*avgCp*T;
  const RC=2*Math.sqrt(avgCp**7/(avgCp**7+25**7));
  const RT=-Math.sin(2*((avghp-275)/25)**2*DEG*180/Math.PI)*RC;
  return Math.sqrt((dLp/SL)**2+(dCp/SC)**2+(dHp/SH)**2+RT*(dCp/SC)*(dHp/SH));
}
function deltaEComponents(lab1,lab2){
  const dL=lab2.L-lab1.L;
  const C1=Math.sqrt(lab1.a**2+lab1.b**2),C2=Math.sqrt(lab2.a**2+lab2.b**2);
  const dC=C2-C1,da=lab2.a-lab1.a,db=lab2.b-lab1.b;
  const dH=Math.sqrt(Math.max(0,da**2+db**2-dC**2));
  return{dL:Math.abs(dL),dC:Math.abs(dC),dH};
}
function scoreFromDeltaE(dE,strictness='standard'){
  const caps={relaxed:35,standard:25,strict:18,wcag:15};
  const cap=caps[strictness]??25;
  if(dE<=1)return 100;
  if(dE>=cap)return 0;
  return Math.round(100*Math.pow(1-dE/cap,1.6));
}
function scoreLabel(score){
  if(score>=97)return{text:'PERFECT',   color:'#3dffa0',glow:'#3dffa055'};
  if(score>=88)return{text:'EXCELLENT', color:'#44ff88',glow:'#44ff8855'};
  if(score>=74)return{text:'GOOD',      color:'#aaee44',glow:'#aaee4455'};
  if(score>=55)return{text:'FAIR',      color:'#ffcc44',glow:'#ffcc4455'};
  return             {text:'TRY AGAIN', color:'#ff5533',glow:'#ff553355'};
}
function contrastRatio(rgb1,rgb2){
  const L=({r,g,b})=>{const l=v=>{v/=255;return v<=0.04045?v/12.92:((v+0.055)/1.055)**2.4};return 0.2126*l(r)+0.7152*l(g)+0.0722*l(b)};
  const l1=L(rgb1),l2=L(rgb2);
  return(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
}
function wcagLevel(ratio){
  if(ratio>=7)  return{level:'AAA',    pass:true, color:'#3dffa0'};
  if(ratio>=4.5)return{level:'AA',     pass:true, color:'#44ff88'};
  if(ratio>=3)  return{level:'AA Lg',  pass:true, color:'#ffcc44'};
  return              {level:'Fail',   pass:false,color:'#ff5533'};
}
function randomTarget(difficulty){
  const B={novice:{sMin:65,sMax:90,lMin:42,lMax:62},medium:{sMin:45,sMax:90,lMin:32,lMax:72},hard:{sMin:25,sMax:95,lMin:22,lMax:78},master:{sMin:8,sMax:100,lMin:12,lMax:88}};
  const b=B[difficulty]??B.medium;
  return{h:Math.random()*360,s:b.sMin+Math.random()*(b.sMax-b.sMin),l:b.lMin+Math.random()*(b.lMax-b.lMin)};
}

// ─── C1 HARMONY MATH ───
const HarmonyMath = {
  norm(h){return((h%360)+360)%360},
  angDiff(a,b){const d=Math.abs(this.norm(a)-this.norm(b));return d>180?360-d:d},
  hueScore(guess,target,tol=30){return Math.max(0,Math.round(100-this.angDiff(guess,target)*100/tol))},
  satScore(guess,target,tol=40){return Math.max(0,Math.round(100-Math.abs(guess-target)*100/tol))},
  avg(scores){if(!scores.length)return 0;return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)},
};

// ─── GEOMETRY HELPERS (for HSL wheel) ───
function triVertices(cx,cy,r,hDeg){
  const base=(hDeg-90)*DEG;
  return[{x:cx+r*Math.cos(base),y:cy+r*Math.sin(base)},{x:cx+r*Math.cos(base-TAU/3),y:cy+r*Math.sin(base-TAU/3)},{x:cx+r*Math.cos(base+TAU/3),y:cy+r*Math.sin(base+TAU/3)}];
}
function bary(px,py,v0,v1,v2){
  const denom=(v1.y-v2.y)*(v0.x-v2.x)+(v2.x-v1.x)*(v0.y-v2.y);
  if(Math.abs(denom)<1e-10)return{w0:1/3,w1:1/3,w2:1/3,inside:false};
  const w0=((v1.y-v2.y)*(px-v2.x)+(v2.x-v1.x)*(py-v2.y))/denom;
  const w1=((v2.y-v0.y)*(px-v2.x)+(v0.x-v2.x)*(py-v2.y))/denom;
  const w2=1-w0-w1;
  return{w0,w1,w2,inside:w0>=0&&w1>=0&&w2>=0};
}
function clampToTri(px,py,verts){
  const[v0,v1,v2]=verts;
  const{w0,w1,w2,inside}=bary(px,py,v0,v1,v2);
  if(inside)return{x:px,y:py};
  const cw0=Math.max(0,w0),cw1=Math.max(0,w1),cw2=Math.max(0,w2);
  const s=cw0+cw1+cw2;
  if(s<1e-10)return{x:(v0.x+v1.x+v2.x)/3,y:(v0.y+v1.y+v2.y)/3};
  return{x:(cw0*v0.x+cw1*v1.x+cw2*v2.x)/s,y:(cw0*v0.y+cw1*v1.y+cw2*v2.y)/s};
}
function hslToTriPos(hsl,cx,cy,triR){
  const{sv,v}=hslToHsv(hsl.h,hsl.s,hsl.l);
  const verts=triVertices(cx,cy,triR,hsl.h);
  const w0=sv*v,w1=(1-sv)*v,w2=1-v;
  return{x:w0*verts[0].x+w1*verts[1].x+w2*verts[2].x,y:w0*verts[0].y+w1*verts[1].y+w2*verts[2].y};
}
function triPosToHsl(px,py,hDeg,cx,cy,triR){
  const verts=triVertices(cx,cy,triR,hDeg);
  const clamped=clampToTri(px,py,verts);
  const{w0,w1}=bary(clamped.x,clamped.y,verts[0],verts[1],verts[2]);
  const cw0=Math.max(0,w0),cw1=Math.max(0,w1);
  const v=cw0+cw1;
  const sv=v<1e-10?0:cw0/v;
  return hsvToHsl(hDeg,sv,Math.min(1,Math.max(0,v)));
}
function hitRing(x,y,cx,cy,innerR,outerR){
  const d2=(x-cx)**2+(y-cy)**2;
  return d2>=innerR*innerR&&d2<=outerR*outerR;
}
function angleToHue(x,y,cx,cy){return(((Math.atan2(y-cy,x-cx)/DEG)+90)%360+360)%360}

// ─── EXPORT UTILITIES ───
function exportPalette(colors,format){
  const labeled=colors.map((c,i)=>({index:i+1,hsl:{h:Math.round(c.h),s:Math.round(c.s),l:Math.round(c.l)},hex:hslToHex(c.h,c.s,c.l),rgb:hslToRgb(c.h,c.s,c.l)}));
  let content,filename,type;
  if(format==='json'){
    content=JSON.stringify({exported:new Date().toISOString(),count:colors.length,colors:labeled},null,2);
    filename='chromix-palette.json';type='application/json';
  }else{
    const vars=labeled.map(c=>`  --color-${c.index}: ${c.hex};`).join('\n');
    content=`:root {\n${vars}\n}`;
    filename='chromix-palette.css';type='text/css';
  }
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════════
const AudioEngine=(()=>{
  let ctx=null;
  const get=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx};
  const tone=(freq,dur,type='sine',vol=0.22)=>{
    try{
      const a=get();
      const osc=a.createOscillator(),g=a.createGain();
      osc.connect(g);g.connect(a.destination);
      osc.type=type;osc.frequency.value=freq;
      g.gain.setValueAtTime(vol,a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
      osc.start();osc.stop(a.currentTime+dur+0.01);
    }catch(e){}
  };
  return{
    click:()=>tone(1100,0.04,'square',0.08),
    submit:()=>tone(500,0.1,'sine',0.18),
    perfect:()=>{tone(523,.12);setTimeout(()=>tone(659,.12),110);setTimeout(()=>tone(784,.18),220);setTimeout(()=>tone(1047,.2),340)},
    good:()=>{tone(440,.1);setTimeout(()=>tone(523,.12),100)},
    fail:()=>tone(180,.3,'sawtooth',.12),
    levelUp:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.2),i*90)),
  };
})();

function scoreToStars(score){
  if(score>=95)return 5;
  if(score>=85)return 4;
  if(score>=70)return 3;
  if(score>=50)return 2;
  return 1;
}
function starLabel(n){return['TRY AGAIN','CLOSE','GOOD','EXCELLENT','PERFECT'][n-1]||'–'}

// Rating history storage
const RatingStore={
  KEY:'chromix-ratings',
  get(){try{return JSON.parse(localStorage.getItem(this.KEY)||'[]')}catch{return[]}},
  add(score,mode=''){
    const h=this.get();
    const stars=scoreToStars(score);
    h.unshift({score,stars,mode,ts:Date.now()});
    if(h.length>20)h.pop();
    try{localStorage.setItem(this.KEY,JSON.stringify(h))}catch{}
    return stars;
  }
};

// StarRating component — C1 style with glow
function StarRating({score,show=true,mode='',size='normal'}){

      </div>

// Harmony target calculations
function getHarmonyTargets(type,baseHue){
  const n=h=>HarmonyMath.norm(h);
  switch(type){
    case'complementary':  return[{hue:n(baseHue+180),label:'+180°'}];
    case'analogous_plus': return[{hue:n(baseHue+30),label:'+30°'}];
    case'analogous_minus':return[{hue:n(baseHue-30),label:'−30°'}];
    case'analogous':      return[{hue:n(baseHue+30),label:'+30°'},{hue:n(baseHue-30),label:'−30°'}];
    case'triadic_1':      return[{hue:n(baseHue+120),label:'+120°'}];
    case'triadic_2':      return[{hue:n(baseHue+240),label:'+240°'}];
    case'triadic':        return[{hue:n(baseHue+120),label:'+120°'},{hue:n(baseHue+240),label:'+240°'}];
    case'tetradic_1':     return[{hue:n(baseHue+90),label:'+90°'}];
    case'tetradic_2':     return[{hue:n(baseHue+180),label:'+180°'}];
    case'tetradic_3':     return[{hue:n(baseHue+270),label:'+270°'}];
    case'tetradic':       return[{hue:n(baseHue+90),label:'+90°'},{hue:n(baseHue+180),label:'+180°'},{hue:n(baseHue+270),label:'+270°'}];
    case'hue_match':      return[{hue:baseHue,label:`${Math.round(baseHue)}°`}];
    case'hue_warm':       return[{hue:45,label:'Warm (0°–90°)',tol:45}];
    case'hue_cool':       return[{hue:220,label:'Cool (150°–300°)',tol:75}];
    default:              return[];
  }
}
function getOverlayMode(type){
  if(type.startsWith('triadic'))return'triangle';
  if(type.startsWith('tetradic'))return'rect';
  return'lines';
}
function isSatMode(type){return type.startsWith('sat_')}

function calcHarmonyScore(task,playerHues,playerSat,satTarget){
  if(isSatMode(task.type)){
    if(task.type==='sat_max')   return HarmonyMath.satScore(playerSat,100,30);
    if(task.type==='sat_pastel')return HarmonyMath.satScore(playerSat,15,30);
    if(task.type==='sat_match') return HarmonyMath.satScore(playerSat,Math.round(satTarget),30);
    return 0;
  }
  const targets=getHarmonyTargets(task.type,0); // baseHue handled externally
  if(!playerHues.length)return 0;
  return 0; // computed in component with proper baseHue
}

function useContainerSize(){
  const ref=useRef(null);
  const[size,setSize]=useState({width:0,height:0});
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    setSize({width:el.offsetWidth,height:el.offsetHeight});
    if(!window.ResizeObserver)return;
    const ro=new ResizeObserver(entries=>{
      for(const e of entries){const{width,height}=e.contentRect;setSize({width:Math.floor(width),height:Math.floor(height)})}

    ro.observe(el);return()=>ro.disconnect();

}

// ═══════════════════════════════════════════════════════════════════
//  COLOR WHEEL — dual-canvas barycentric triangle (ChromaLab v4, untouched)
// ═══════════════════════════════════════════════════════════════════
const MIN_WHEEL=180,MAX_WHEEL=380;

function ColorWheel({color,onChange,locked=false,showTarget=false,targetColor=null,size:sizeProp}){
  const{s:cfg}=useSettings();
  const size=sizeProp??Math.min(MAX_WHEEL,Math.max(MIN_WHEEL,cfg.wheelSize));
  const bgRef=useRef(null),fgRef=useRef(null);
  const dragRef=useRef(null);
  const triCache=useRef({hue:-999,imageData:null});
  const rafId=useRef(null);
  const outerR=size*.47,thick=Math.max(8,size*cfg.ringThicknessRatio),innerR=outerR-thick,triR=size*cfg.triRadiusRatio;
  const cx=size/2,cy=size/2,hR=Math.max(7,size*.038);

  const drawRing=useCallback(()=>{
    const canvas=bgRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const SEG=720;
    for(let i=0;i<SEG;i++){
      const a0=(i/SEG)*TAU-Math.PI/2,a1=((i+1)/SEG)*TAU-Math.PI/2;
      ctx.beginPath();ctx.arc(cx,cy,outerR,a0,a1);ctx.arc(cx,cy,innerR,a1,a0,true);ctx.closePath();
      ctx.fillStyle=`hsl(${(i/SEG)*360},100%,50%)`;ctx.fill();
    }
  },[cx,cy,outerR,innerR]);

  const drawTriangle=useCallback(()=>{
    const canvas=bgRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const hKey=Math.round(color.h);
    if(triCache.current.hue===hKey&&triCache.current.imageData){ctx.putImageData(triCache.current.imageData,0,0);return}
    const imgData=ctx.getImageData(0,0,size,size),d=imgData.data;
    const verts=triVertices(cx,cy,triR,color.h);
    const[vH,vW,vB]=verts,pureHue=hsvToRgb(color.h,1,1);
    const minX=Math.max(0,Math.floor(Math.min(vH.x,vW.x,vB.x))-1);
    const maxX=Math.min(size-1,Math.ceil(Math.max(vH.x,vW.x,vB.x))+1);
    const minY=Math.max(0,Math.floor(Math.min(vH.y,vW.y,vB.y))-1);
    const maxY=Math.min(size-1,Math.ceil(Math.max(vH.y,vW.y,vB.y))+1);
    const denom=(vW.y-vB.y)*(vH.x-vB.x)+(vB.x-vW.x)*(vH.y-vB.y);
    if(Math.abs(denom)<1e-10)return;
    const inv=1/denom,eps=0.004;
    for(let py=minY;py<=maxY;py++){
      for(let px=minX;px<=maxX;px++){
        if((px-cx)**2+(py-cy)**2>innerR*innerR)continue;
        const w0=((vW.y-vB.y)*(px-vB.x)+(vB.x-vW.x)*(py-vB.y))*inv;
        const w1=((vB.y-vH.y)*(px-vB.x)+(vH.x-vB.x)*(py-vB.y))*inv;
        const w2=1-w0-w1;
        if(w0>=-eps&&w1>=-eps&&w2>=-eps){
          const wh=Math.max(0,w0),ww=Math.max(0,w1);
          const idx=(py*size+px)*4;
          d[idx]=Math.min(255,Math.round(wh*pureHue.r+ww*255));
          d[idx+1]=Math.min(255,Math.round(wh*pureHue.g+ww*255));
          d[idx+2]=Math.min(255,Math.round(wh*pureHue.b+ww*255));
          d[idx+3]=255;
        }
      }
    }
    ctx.putImageData(imgData,0,0);
    triCache.current={hue:hKey,imageData:ctx.getImageData(0,0,size,size)};
  },[color.h,cx,cy,triR,innerR,size]);

  const drawHandles=useCallback(()=>{
    const canvas=fgRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,size,size);
    const ring_θ=(color.h-90)*DEG;
    const hueHdl={x:cx+(innerR+thick/2)*Math.cos(ring_θ),y:cy+(innerR+thick/2)*Math.sin(ring_θ)};
    const svHdl=hslToTriPos(color,cx,cy,triR);
    const drawH=(pos,fill,dashed=false,dimmed=false)=>{
      ctx.save();
      if(dimmed)ctx.globalAlpha=0.5;
      ctx.beginPath();ctx.arc(pos.x,pos.y,hR+(dashed?5:0),0,TAU);
      ctx.fillStyle=dashed?'transparent':fill;
      ctx.strokeStyle=dashed?'rgba(255,255,255,.55)':'rgba(255,255,255,.9)';
      ctx.lineWidth=dashed?1.5:2.5;
      if(!dashed)ctx.fill();ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    };
    if(showTarget&&targetColor){
      const tθ=(targetColor.h-90)*DEG;
      drawH({x:cx+(innerR+thick/2)*Math.cos(tθ),y:cy+(innerR+thick/2)*Math.sin(tθ)},'#fff',true,true);
      drawH(hslToTriPos(targetColor,cx,cy,triR),'#fff',true,true);
    }
    ctx.save();
    ctx.beginPath();ctx.arc(hueHdl.x,hueHdl.y,hR+8,0,TAU);
    ctx.fillStyle=`hsla(${color.h},100%,55%,.18)`;ctx.fill();ctx.restore();
    drawH(hueHdl,`hsl(${color.h},100%,55%)`);
    drawH(svHdl,`hsl(${color.h},${Math.round(color.s)}%,${Math.round(color.l)}%)`);
  },[color,targetColor,showTarget,cx,cy,innerR,thick,triR,hR,size]);

  const redrawBg=useCallback(()=>{
    const canvas=bgRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,size,size);
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,outerR+3,0,TAU);
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=3;ctx.stroke();ctx.restore();
    drawRing();drawTriangle();
  },[cx,cy,outerR,size,drawRing,drawTriangle]);

  const prevHue=useRef(-1);
  useEffect(()=>{
    if(Math.round(color.h)!==Math.round(prevHue.current)){triCache.current={hue:-999,imageData:null};prevHue.current=color.h}
    redrawBg();
  },[color.h,redrawBg]);

  useEffect(()=>{
    if(rafId.current)cancelAnimationFrame(rafId.current);
    rafId.current=requestAnimationFrame(drawHandles);
    return()=>{if(rafId.current)cancelAnimationFrame(rafId.current)};
  },[drawHandles]);

  const getPos=useCallback(e=>{
    const rect=fgRef.current.getBoundingClientRect(),scale=size/rect.width;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*scale,y:(src.clientY-rect.top)*scale};
  },[size]);
  const onDown=useCallback(e=>{
    if(locked)return;e.preventDefault();
    const{x,y}=getPos(e);
    if(hitRing(x,y,cx,cy,innerR-4,outerR+4)){dragRef.current='hue';onChange({...color,h:angleToHue(x,y,cx,cy)})}
    else if((x-cx)**2+(y-cy)**2<innerR*innerR){dragRef.current='sv';onChange(triPosToHsl(x,y,color.h,cx,cy,triR))}
  },[locked,getPos,cx,cy,innerR,outerR,triR,color,onChange]);
  const onMove=useCallback(e=>{
    if(!dragRef.current||locked)return;e.preventDefault();
    const{x,y}=getPos(e);
    if(dragRef.current==='hue')onChange({...color,h:angleToHue(x,y,cx,cy)});
    else onChange(triPosToHsl(x,y,color.h,cx,cy,triR));
  },[locked,getPos,cx,cy,triR,color,onChange]);
  const onUp=useCallback(()=>{dragRef.current=null},[]);

  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <canvas ref={bgRef} width={size} height={size} style={{position:'absolute',inset:0,borderRadius:'50%'}}/>
      <canvas ref={fgRef} width={size} height={size}
        style={{position:'absolute',inset:0,borderRadius:'50%',cursor:locked?'default':'crosshair',touchAction:'none'}}
        onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
        onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
      />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  HUE RING WHEEL — C1-style, ring-only with multi-marker support
// ═══════════════════════════════════════════════════════════════════
function HueRingWheel({baseHue,markers,onMarkerMove,overlayMode,size=300}){
  const bgRef=useRef(null),fgRef=useRef(null);
  const dragIdx=useRef(-1);
  const activeIdx=useRef(markers.findIndex(m=>m.draggable));
  const W=size,outerR=W*.47,ringRatio=0.14,innerR=outerR*(1-ringRatio),cx=W/2,cy=W/2;

  // Draw background ring
  const drawBg=useCallback(()=>{
    const canvas=bgRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,W);
    const SEG=720;
    for(let i=0;i<SEG;i++){
      const a0=(i/SEG)*TAU-Math.PI/2,a1=((i+1)/SEG)*TAU-Math.PI/2;
      ctx.beginPath();ctx.arc(cx,cy,outerR,a0,a1);ctx.arc(cx,cy,innerR,a1,a0,true);ctx.closePath();
      ctx.fillStyle=`hsl(${(i/SEG)*360},100%,50%)`;ctx.fill();
    }
    // Dark center
    const grad=ctx.createRadialGradient(cx,cy-innerR*.05,0,cx,cy,innerR);
    grad.addColorStop(0,`hsl(${baseHue},16%,14%)`);grad.addColorStop(1,`hsl(${baseHue},10%,7%)`);
    ctx.beginPath();ctx.arc(cx,cy,innerR-1,0,TAU);ctx.fillStyle=grad;ctx.fill();
  },[W,cx,cy,outerR,innerR,baseHue]);

  const ringR=()=>(outerR+innerR)/2;
  const hueToXY=(h,r)=>{const a=(h-90)*DEG;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}};

  const drawFg=useCallback(()=>{
    const canvas=fgRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,W);
    const rr=ringR();

    // Overlay lines/shapes
    if(overlayMode&&markers.length){
      const bPt=hueToXY(baseHue,rr);
      const mPts=markers.map(m=>hueToXY(m.hue,rr));
      const all=[bPt,...mPts];
      ctx.save();ctx.setLineDash([5,5]);ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,255,255,.18)';
      if(overlayMode==='triangle'&&all.length>=3){
        ctx.beginPath();all.slice(0,3).forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
      }else if(overlayMode==='rect'&&all.length>=4){
        ctx.beginPath();all.slice(0,4).forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
        ctx.beginPath();ctx.moveTo(all[0].x,all[0].y);ctx.lineTo(all[2].x,all[2].y);ctx.moveTo(all[1].x,all[1].y);ctx.lineTo(all[3].x,all[3].y);ctx.stroke();
      }else{
        all.forEach(p=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.stroke()});
      }
      // Arcs
      markers.forEach(m=>{
        const a1=(baseHue-90)*DEG,a2=(m.hue-90)*DEG,r2=rr+14;
        ctx.setLineDash([]);ctx.beginPath();ctx.arc(cx,cy,r2,Math.min(a1,a2),Math.max(a1,a2));
        ctx.strokeStyle=`hsla(${m.hue},80%,60%,.22)`;ctx.lineWidth=2;ctx.stroke();
      });
      ctx.setLineDash([]);ctx.restore();
    }

    // Draw all markers
    markers.forEach((m,i)=>{
      const pt=hueToXY(m.hue,rr);
      const R=12,isAct=m.draggable&&i===activeIdx.current;
      if(isAct){ctx.save();ctx.beginPath();ctx.arc(pt.x,pt.y,R+8,0,TAU);ctx.fillStyle=`hsla(${m.hue},80%,55%,.2)`;ctx.fill();ctx.restore()}
      ctx.save();ctx.shadowColor=`hsl(${m.hue},70%,35%)`;ctx.shadowBlur=m.draggable?14:7;
      ctx.beginPath();ctx.arc(pt.x,pt.y,R,0,TAU);ctx.fillStyle=`hsl(${m.hue},88%,55%)`;ctx.fill();ctx.restore();
      ctx.beginPath();ctx.arc(pt.x,pt.y,R,0,TAU);
      ctx.strokeStyle=m.isBase?'rgba(255,255,255,.95)':(m.draggable?'rgba(255,255,255,.85)':'rgba(255,255,255,.35)');
      ctx.lineWidth=m.isBase?2.5:2;ctx.stroke();
      ctx.save();ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.82)';
      const above=pt.y<cy;ctx.fillText(m.label,pt.x,pt.y+(above?R+12:-(R+3)));ctx.restore();
    });
  },[W,cx,cy,outerR,innerR,baseHue,markers,overlayMode]);

  useEffect(()=>{drawBg()},[drawBg]);
  useEffect(()=>{requestAnimationFrame(drawFg)},[drawFg]);

  const getPos=e=>{
    const rect=fgRef.current.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*(W/rect.width),y:(src.clientY-rect.top)*(W/rect.height)};
  };
  const posToHue=(x,y)=>HarmonyMath.norm(Math.atan2(y-cy,x-cx)*180/Math.PI+90);
  const onRing=(x,y)=>{const d=Math.hypot(x-cx,y-cy);return d>=innerR-12&&d<=outerR+12};
  const nearestDraggable=(x,y)=>{
    let best=-1,bestD=26;const rr=ringR();
    markers.forEach((m,i)=>{
      if(!m.draggable)return;const pt=hueToXY(m.hue,rr);
      const d=Math.hypot(x-pt.x,y-pt.y);if(d<bestD){bestD=d;best=i}
    });
    return best;
  };
  const onDown=e=>{
    e.preventDefault();const{x,y}=getPos(e);
    const idx=nearestDraggable(x,y);
    if(idx>=0){dragIdx.current=idx;activeIdx.current=idx;return}
    if(onRing(x,y)){const first=markers.findIndex(m=>m.draggable);if(first>=0){dragIdx.current=first;activeIdx.current=first;onMarkerMove(first,posToHue(x,y))}}
  };
  const onMove=e=>{
    if(dragIdx.current<0)return;e.preventDefault();
    const{x,y}=getPos(e);onMarkerMove(dragIdx.current,posToHue(x,y));
  };
  const onUp=()=>{dragIdx.current=-1};
  const nudge=delta=>{
    const draggables=markers.map((m,i)=>({m,i})).filter(x=>x.m.draggable);
    if(!draggables.length)return;
    if(!markers[activeIdx.current]||!markers[activeIdx.current].draggable)activeIdx.current=draggables[0].i;
    onMarkerMove(activeIdx.current,HarmonyMath.norm(markers[activeIdx.current].hue+delta));
  };

  return(
    <div style={{position:'relative',width:W,height:W,flexShrink:0}}>
      <canvas ref={bgRef} width={W} height={W} style={{position:'absolute',inset:0,borderRadius:'50%'}}/>
      <canvas ref={fgRef} width={W} height={W}
        style={{position:'absolute',inset:0,borderRadius:'50%',cursor:'crosshair',touchAction:'none'}}
        onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
        onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
      />
    </div>
  );
}

function Btn({onClick,children,variant='primary',small,style:sty,disabled,title}){
  const{C}=useTheme();
  const[hov,setHov]=useState(false);
  const base={
    border:'none',borderRadius:10,fontFamily:'inherit',cursor:disabled?'not-allowed':'pointer',
    fontWeight:700,letterSpacing:'.07em',
    transition:'transform .13s ease,box-shadow .18s ease,background .15s,border-color .15s,opacity .15s',
    opacity:disabled?.35:1,
    padding:small?'7px 14px':'11px 22px',fontSize:small?11:13,
    display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,
    transform:hov&&!disabled?'translateY(-2px) scale(1.015)':'translateY(0) scale(1)',
    backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',
  };
  const D=C.btnDark||'rgba(0,0,0,.72)';  // dark box base
  const B=C.btnBorder||C.borderLight;      // theme border
  const G=C.btnGlow||C.accentGlow;         // glow colour
  const variants={
    primary:{
      background:`linear-gradient(135deg,${C.accent},${C.accentAlt})`,
      color:'#fff',
      border:'none',
      boxShadow:hov
        ?`0 8px 32px ${G},0 0 0 1px ${C.accent}55,inset 0 1px 0 rgba(255,255,255,.18)`
        :`0 4px 20px ${G},0 0 0 1px ${C.accent}33,inset 0 1px 0 rgba(255,255,255,.12)`,
      textShadow:'0 1px 4px rgba(0,0,0,.3)',
    },
    secondary:{
      background:D,
      border:`1px solid ${B}`,
      color:C.textPrimary,
      boxShadow:hov
        ?`0 6px 24px ${G},0 0 0 1px ${B},inset 0 1px 0 rgba(255,255,255,.07)`
        :`0 2px 12px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04)`,
    },
    ghost:{
      background:`${D.replace(/[\d.]+\)$/,'0.52)')}`,
      border:`1px solid ${C.border}`,
      color:C.textSecondary,
      boxShadow:hov
        ?`0 4px 18px rgba(0,0,0,.6),0 0 0 1px ${C.border}`
        :`0 1px 6px rgba(0,0,0,.35)`,
    },
    danger:{
      background:`linear-gradient(135deg,#aa1500,#ee3311)`,
      color:'#fff',
      border:'none',
      boxShadow:hov
        ?`0 6px 24px rgba(200,30,0,.6),0 0 0 1px rgba(255,80,50,.4),inset 0 1px 0 rgba(255,255,255,.12)`
        :`0 3px 14px rgba(200,30,0,.4),inset 0 1px 0 rgba(255,255,255,.08)`,
    },
    accent:{
      background:D,
      border:`1px solid ${C.accent}55`,
      color:C.accent,
      boxShadow:hov
        ?`0 5px 22px ${G},0 0 0 1px ${C.accent}44`
        :`0 2px 10px rgba(0,0,0,.4),0 0 0 1px ${C.accent}22`,
      textShadow:hov?`0 0 12px ${G}`:undefined,
    },
  };
  return<button title={title} onClick={disabled?undefined:onClick}
    onMouseEnter={()=>setHov(true)}
    onMouseLeave={()=>setHov(false)}
    onMouseDown={e=>{e.currentTarget.style.transform='translateY(0) scale(.97)'}}
    onMouseUp={e=>{e.currentTarget.style.transform=hov?'translateY(-2px) scale(1.015)':'translateY(0) scale(1)'}}
    style={{...base,...variants[variant],...sty}}>{children}</button>;
}

function HistoryTimeline({history,onSelect,onExport,C}){
  const[replaying,setReplaying]=useState(false);
  const[replayIdx,setReplayIdx]=useState(0);
  const startReplay=()=>{
    if(!history.length)return;
    setReplaying(true);setReplayIdx(0);
    let i=0;const step=()=>{if(i>=history.length){setReplaying(false);return}setReplayIdx(i);onSelect(history[i]);i++;setTimeout(step,800)};step();
  };
  if(!history.length)return<div style={{color:C.textMuted,fontSize:11,padding:'8px 0'}}>No history yet — start matching colors.</div>;
  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:6}}>
      <span style={{color:C.textMuted,fontSize:10,letterSpacing:2}}>{history.length} SWATCHES</span>
      <div style={{display:'flex',gap:5}}>
        <Btn onClick={startReplay} disabled={replaying} variant="ghost" small>▶ Replay</Btn>
        <Btn onClick={()=>onExport('json')} variant="ghost" small>⬇ JSON</Btn>

    </div>
    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
      {history.map((c,i)=>(
        <div key={c.ts} onClick={()=>onSelect(c)}
          style={{width:26,height:26,borderRadius:5,background:`hsl(${c.h},${c.s}%,${c.l}%)`,cursor:'pointer',transition:'transform .15s',outline:replaying&&i===replayIdx?'2px solid #fff':'none',transform:replaying&&i===replayIdx?'scale(1.25)':'scale(1)'}}
          title={`H:${Math.round(c.h)}° S:${Math.round(c.s)}% L:${Math.round(c.l)}%`}/>

    </div>
  </div>;
}

function GameMode(){
  const{C}=useTheme();
  const{s:cfg}=useSettings();
  const[difficulty,setDifficulty]=useState('medium');
  const[phase,setPhase]=useState('play');
  const[target,setTarget]=useState(()=>randomTarget('medium'));
  const[attempt,setAttempt]=useState({h:180,s:50,l:50});
  const[result,setResult]=useState(null);
  const[rounds,setRounds]=useState([]);
  const[streak,setStreak]=useState(0);
  const[showExpert,setShowExpert]=useState(false);
  const[showCorrection,setShowCorrection]=useState(false);
  const startRef=useRef(Date.now());
  const{history,push:pushHistory,clear:clearHistory}=useColorHistory();
  const tRgb=hslToRgb(target.h,target.s,target.l),aRgb=hslToRgb(attempt.h,attempt.s,attempt.l);
  const tLab=rgbToLab(tRgb),aLab=rgbToLab(aRgb);
  const liveDeltaE=deltaE2000(tLab,aLab),liveScore=scoreFromDeltaE(liveDeltaE,cfg.scoringStrictness);
  const lbl=scoreLabel(liveScore);
  const handleChange=useCallback(c=>{setAttempt(c);pushHistory(c)},[pushHistory]);

  useEffect(()=>{
    const handler=e=>{
      if(phase==='result'){if(e.key==='n'||e.key==='N'){next()};return}
      const step=e.shiftKey?(cfg.sensitivity*.5):(cfg.sensitivity*1.5);
      const bigStep=cfg.sensitivity*3;
      switch(e.key){
        case'ArrowLeft': setAttempt(p=>({...p,h:((p.h-bigStep)+360)%360})); e.preventDefault(); break;
        case'ArrowRight': setAttempt(p=>({...p,h:(p.h+bigStep)%360})); e.preventDefault(); break;
        case'ArrowUp': if(e.shiftKey)setAttempt(p=>({...p,s:Math.min(100,p.s+step)}));else setAttempt(p=>({...p,l:Math.min(100,p.l+step)})); e.preventDefault(); break;
        case'ArrowDown': if(e.shiftKey)setAttempt(p=>({...p,s:Math.max(0,p.s-step)}));else setAttempt(p=>({...p,l:Math.max(0,p.l-step)})); e.preventDefault(); break;
        case'Enter': submit(); break;
        case'Tab': e.preventDefault(); setShowExpert(x=>!x); break;
        case'1': changeDifficulty('novice'); break;
        case'2': changeDifficulty('medium'); break;
        case'3': changeDifficulty('hard'); break;
        case'4': changeDifficulty('master'); break;
      }
    };
    window.addEventListener('keydown',handler);return()=>window.removeEventListener('keydown',handler);
  },[phase,cfg,liveScore,liveDeltaE,target,attempt]);

  const submit=()=>{
    const timeMs=Date.now()-startRef.current;
    const score=liveScore;
    const newStreak=score>=75?streak+1:0;
    setStreak(newStreak);
    RatingStore.add(score,'Classic');
    const r={score,deltaE:liveDeltaE,timeMs,target,attempt};
    setResult(r);setRounds(prev=>[r,...prev.slice(0,11)]);
    setPhase('result');
    if(cfg.soundEnabled){if(score>=95)AudioEngine.perfect();else if(score>=70)AudioEngine.good();else{AudioEngine.fail();setShowCorrection(true)}}
    else if(score<55)setShowCorrection(true);
  };
  const next=()=>{setTarget(randomTarget(difficulty));setAttempt({h:180,s:50,l:50});setPhase('play');setResult(null);startRef.current=Date.now()};
  const changeDifficulty=d=>{setDifficulty(d);setTarget(randomTarget(d));setAttempt({h:180,s:50,l:50});setPhase('play');setResult(null);startRef.current=Date.now()};

  const[winW,setWinW]=useState(window.innerWidth);
  useEffect(()=>{
    const onResize=()=>setWinW(window.innerWidth);
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[]);
  const isTwoCol=winW>=640;
  // Wheel: half of usable space (max 300) in two-col, full usable width in one-col (capped at 340)
  const usableW=Math.min(winW-40, 940); // subtract padding
  const wheelColW=isTwoCol ? Math.round(Math.min(300, usableW*0.42)) : Math.round(Math.min(340, usableW));

  return<div style={{animation:'fadeIn .25s ease'}}>
    <CorrectionOverlay target={target} attempt={attempt} visible={showCorrection} onDismiss={()=>setShowCorrection(false)} C={C}/>
    <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center',marginBottom:20}}>
      <div style={{display:'flex',gap:5}}>
        {['novice','medium','hard','master'].map(d=>(
          <Btn key={d} onClick={()=>changeDifficulty(d)} variant={difficulty===d?'primary':'ghost'} small>{d}</Btn>
        ))}
      </div>
      {streak>=2&&<Badge color="#fff" bg="linear-gradient(90deg,#ff6600,#ff3300)">🔥 {streak} STREAK</Badge>}
    </div>
    <div style={{display:'flex',flexDirection:isTwoCol?'row':'column',gap:isTwoCol?'clamp(16px,3vw,28px)':20,alignItems:isTwoCol?'flex-start':'center'}}>
      <div style={{flexShrink:0}}>
        <WheelColumn color={attempt} onChange={handleChange} locked={phase==='result'} target={target} attempt={attempt} phase={phase} showTarget={false} targetColor={null} wheelSize={wheelColW}/>
      </div>
      <div style={{flex:1,minWidth:0,width:isTwoCol?undefined:wheelColW,display:'flex',flexDirection:'column',gap:14}}>
        {phase==='play'?(
          <>
            <Card><AccuracyBar score={liveScore} deltaE={liveDeltaE} C={C}/></Card>
            {cfg.precisionMode&&<PrecisionPanel color={attempt} targetColor={target} C={C}/>}
            <Btn onClick={submit} variant="primary">SUBMIT → [Enter]</Btn>
            <Btn onClick={()=>setShowExpert(x=>!x)} variant="ghost" small>{showExpert?'▲ Hide':'▼ Expert'} [Tab]</Btn>
            {showExpert&&<ExpertPanel targetLab={tLab} attemptLab={aLab} deltaE={liveDeltaE} C={C}/>}
          </>
        ):(
          <>
            <div style={{display:'flex',justifyContent:'center'}}><ScoreRing score={result.score} deltaE={result.deltaE} show/></div>
            <Card style={{fontFamily:'monospace',fontSize:11,lineHeight:1.9}}>
              <Tag label="TARGET" value={`H${Math.round(target.h)}° S${Math.round(target.s)}% L${Math.round(target.l)}%`} C={C}/>
              <Tag label="HEX" value={rgbToHex(tRgb)} C={C}/>
              <Tag label="TIME" value={`${(result.timeMs/1000).toFixed(1)}s`} C={C}/>
              <Tag label="DIFFICULTY" value={difficulty.toUpperCase()} C={C}/>
            </Card>
            <ExpertPanel targetLab={tLab} attemptLab={aLab} deltaE={result.deltaE} C={C}/>
            <Btn onClick={next} variant="secondary">NEXT COLOR → [N]</Btn>
            <Card>
              <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>LAST 3 RATINGS</div>
              <RatingHistoryStrip limit={3}/>
            </Card>
          </>
        )}
        {history.length>0&&<Card><HistoryTimeline history={history} onSelect={c=>setAttempt(c)} onExport={fmt=>exportPalette(history,fmt)} C={C}/></Card>}
      </div>
    </div>
    {rounds.length>0&&<div style={{marginTop:24,borderTop:`1px solid ${C.border}`,paddingTop:16}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>ROUND HISTORY</div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {rounds.map((r,i)=>{const sl=scoreLabel(r.score);return<div key={i} title={`Score: ${r.score}`} style={{width:36,height:36,borderRadius:8,background:`conic-gradient(${sl.color} ${r.score*3.6}deg,${C.border} 0)`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:9,color:'#fff',fontWeight:700}}>{r.score}</span></div>})}
      </div>
    </div>}
  </div>;
}

// ── Challenge Generator ──────────────────────────────────────────
const SPRINT_TYPES = ['complementary','analogous','triadic','tetradic','pick_harmony','find_closest','odd_one_out'];

function genChallenge() {
  const type = SPRINT_TYPES[Math.floor(Math.random() * SPRINT_TYPES.length)];
  const baseHue = Math.floor(Math.random() * 360);
  const hsl = (h, s=80, l=55) => ({ h: ((h%360)+360)%360, s, l });
  const toSwatch = (h,s=80,l=55) => `hsl(${((h%360)+360)%360},${s}%,${l}%)`;

  if (type === 'complementary') {
    const correct = (baseHue + 180) % 360;
    const wrong1  = (baseHue + 90)  % 360;
    const wrong2  = (baseHue + 270) % 360;
    const wrong3  = (baseHue + 40)  % 360;
    const opts = shuffle([correct, wrong1, wrong2, wrong3]);
    return { type, icon:'⚡', title:'Find the Complementary Color',
      prompt:`Which color is the complement of`, baseColor: toSwatch(baseHue),
      baseHue, options: opts.map(h=>toSwatch(h)), correctIndex: opts.indexOf(correct) };
  }
  if (type === 'analogous') {
    const correct = (baseHue + 30) % 360;
    const wrong1  = (baseHue + 90) % 360;
    const wrong2  = (baseHue + 180)% 360;
    const wrong3  = (baseHue + 150)% 360;
    const opts = shuffle([correct, wrong1, wrong2, wrong3]);
    return { type, icon:'🔗', title:'Find an Analogous Color',
      prompt:`Which color is analogous to (+30°)`, baseColor: toSwatch(baseHue),
      baseHue, options: opts.map(h=>toSwatch(h)), correctIndex: opts.indexOf(correct) };
  }
  if (type === 'triadic') {
    const correct = (baseHue + 120) % 360;
    const wrong1  = (baseHue + 60)  % 360;
    const wrong2  = (baseHue + 180) % 360;
    const wrong3  = (baseHue + 90)  % 360;
    const opts = shuffle([correct, wrong1, wrong2, wrong3]);
    return { type, icon:'△', title:'Find a Triadic Color',
      prompt:`Which color forms a triadic (+120°) with`, baseColor: toSwatch(baseHue),
      baseHue, options: opts.map(h=>toSwatch(h)), correctIndex: opts.indexOf(correct) };
  }
  if (type === 'tetradic') {
    const correct = (baseHue + 90)  % 360;
    const wrong1  = (baseHue + 120) % 360;
    const wrong2  = (baseHue + 45)  % 360;
    const wrong3  = (baseHue + 180) % 360;
    const opts = shuffle([correct, wrong1, wrong2, wrong3]);
    return { type, icon:'□', title:'Find a Tetradic Color',
      prompt:`Which color is 90° away (tetradic) from`, baseColor: toSwatch(baseHue),
      baseHue, options: opts.map(h=>toSwatch(h)), correctIndex: opts.indexOf(correct) };
  }
  if (type === 'pick_harmony') {
    // Show 4 swatches, one is harmonious (triadic), rest are random
    const correct = (baseHue + 120) % 360;
    const decoys = [
      (baseHue + 47) % 360, (baseHue + 193) % 360, (baseHue + 71) % 360
    ];
    const opts = shuffle([correct, ...decoys]);
    return { type, icon:'🎨', title:'Pick the Harmonious Color',
      prompt:`Which swatch is harmonically related to`, baseColor: toSwatch(baseHue),
      baseHue, options: opts.map(h=>toSwatch(h)), correctIndex: opts.indexOf(correct) };
  }
  if (type === 'find_closest') {
    const targetHue = (baseHue + 15) % 360;
    const close     = (baseHue + 10) % 360;
    const far1      = (baseHue + 90) % 360;
    const far2      = (baseHue + 180)% 360;
    const opts = shuffle([close, far1, far2, (baseHue + 150) % 360]);
    return { type, icon:'🎯', title:'Find the Closest Color',
      prompt:`Which color is closest in hue to`, baseColor: toSwatch(targetHue, 75, 55),
      baseHue: targetHue, options: opts.map(h=>toSwatch(h)), correctIndex: opts.indexOf(close) };
  }
  // odd_one_out: 3 colors belong to a triad, 1 is an outsider
  if (type === 'odd_one_out') {
    const triad = [(baseHue+120)%360,(baseHue+240)%360];
    const outsider = (baseHue + 55) % 360;
    const all = shuffle([baseHue, triad[0], triad[1], outsider]);
    return { type, icon:'🔍', title:'Spot the Odd One Out',
      prompt:`Three swatches form a triadic harmony. Which one doesn't belong?`,
      baseColor: null, baseHue,
      options: all.map(h=>toSwatch(h)), correctIndex: all.indexOf(outsider) };
  }
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── Timer Hook ───────────────────────────────────────────────────
function useSprintTimer(active, onExpire) {
  const [timeLeft, setTimeLeft] = useState(10);
  const ref = useRef(null);
  const startedAt = useRef(Date.now());

  useEffect(() => {
    if (!active) { clearInterval(ref.current); return; }
    setTimeLeft(10);
    startedAt.current = Date.now();
    ref.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(ref.current); onExpire(); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(ref.current);
  }, [active]);

  const elapsed = () => ((Date.now() - startedAt.current) / 1000).toFixed(1);
  const reset = () => { clearInterval(ref.current); setTimeLeft(10); };
  return { timeLeft, elapsed, reset };
}

// ── Sprint Card ──────────────────────────────────────────────────
function SprintCard({ challenge, onAnswer, C }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);

  const choose = (idx) => {
    if (revealed) return;
    setSelected(idx);
    setRevealed(true);
    setTimeout(() => onAnswer(idx === challenge.correctIndex, idx), 680);
  };

  const borderFor = (idx) => {
    if (!revealed) return `1px solid ${C.border}`;
    if (idx === challenge.correctIndex) return `2px solid ${C.success}`;
    if (idx === selected) return `2px solid ${C.error}`;
    return `1px solid ${C.border}`;
  };
  const bgFor = (idx) => {
    if (!revealed) return C.bgCard;
    if (idx === challenge.correctIndex) return `${C.success}18`;
    if (idx === selected) return `${C.error}18`;
    return C.bgCard;
  };

  return (
    <div style={{animation:'fadeIn .2s ease'}}>
      {/* Prompt */}
      <div style={{background:C.bgSecondary,borderRadius:14,padding:'18px 20px',marginBottom:16,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:challenge.baseColor?14:0}}>
          <span style={{fontSize:22}}>{challenge.icon}</span>
          <div>
            <div style={{fontSize:11,letterSpacing:'.12em',color:C.accent,fontWeight:700,marginBottom:2}}>{challenge.title}</div>
            <div style={{fontSize:13,color:C.textSecondary,lineHeight:1.5}}>{challenge.prompt}{challenge.baseColor?' this:':''}</div>
          </div>
        </div>
        {challenge.baseColor && (
          <div style={{display:'flex',alignItems:'center',gap:12,marginTop:8}}>
            <div style={{width:52,height:52,borderRadius:12,background:challenge.baseColor,boxShadow:`0 4px 16px ${challenge.baseColor}66`,flexShrink:0}}/>
            <div style={{fontFamily:'monospace',fontSize:12,color:C.textMuted}}>Base color</div>
          </div>
        )}
      </div>

      {/* Options Grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {challenge.options.map((opt, idx) => (
          <button key={idx} onClick={() => choose(idx)}
            style={{background:bgFor(idx),border:borderFor(idx),borderRadius:12,padding:'14px 12px',cursor:revealed?'default':'pointer',
              transition:'all .15s',display:'flex',flexDirection:'column',alignItems:'center',gap:10,
              boxShadow:!revealed&&selected===null?`0 2px 8px rgba(0,0,0,.25)`:'none'}}>
            <div style={{width:56,height:56,borderRadius:10,background:opt,boxShadow:`0 3px 12px ${opt}55`,flexShrink:0}}/>
            <div style={{fontSize:11,fontFamily:'monospace',color:C.textMuted}}>
              {revealed && idx === challenge.correctIndex && <span style={{color:C.success,fontWeight:700}}>✓ Correct</span>}
              {revealed && idx === selected && idx !== challenge.correctIndex && <span style={{color:C.error,fontWeight:700}}>✗ Wrong</span>}
              {!revealed && <span>Option {idx+1}</span>}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Main SprintMode ──────────────────────────────────────────────
function SprintMode() {
  const { C } = useTheme();
  const { s: cfg } = useSettings();
  const [phase, setPhase]       = useState('ready');
  const [challenge, setChallenge] = useState(null);
  const [history, setHistory]   = useState([]);   // {correct, time, type}
  const [score, setScore]       = useState(0);
  const [timerKey, setTimerKey] = useState(0);    // increment to restart timer
  const [canEnd, setCanEnd]     = useState(false);
  const challengeRef = useRef(null);

  const MIN_CHALLENGES = 5;

  const nextChallenge = useCallback(() => {
    const c = genChallenge();
    setChallenge(c);
    challengeRef.current = c;
    setTimerKey(k => k + 1);
  }, []);

  const handleExpire = useCallback(() => {
    // timeout = incorrect, 0 time bonus
    const elapsed = 10;
    setHistory(h => [...h, { correct: false, time: elapsed, type: challengeRef.current?.type }]);
    setScore(s => s - 5);
    if (cfg.soundEnabled) AudioEngine.fail?.();
    setTimeout(nextChallenge, 400);
  }, [nextChallenge, cfg.soundEnabled]);

  const { timeLeft, elapsed } = useSprintTimer(phase === 'playing' && !!challenge && timerKey > 0, handleExpire);

  // Update canEnd when history grows
  useEffect(() => {
    if (history.length >= MIN_CHALLENGES) setCanEnd(true);
  }, [history.length]);

  const handleAnswer = useCallback((correct, idx) => {
    const t = parseFloat(elapsed());
    setHistory(h => [...h, { correct, time: t, type: challengeRef.current?.type }]);
    setScore(s => correct ? s + 10 : s - 5);
    if (cfg.soundEnabled) correct ? AudioEngine.good() : AudioEngine.fail?.();
    setTimeout(nextChallenge, 700);
  }, [elapsed, nextChallenge, cfg.soundEnabled]);

  const startSprint = () => {
    setPhase('playing');
    setHistory([]);
    setScore(0);
    setCanEnd(false);
    const c = genChallenge();
    setChallenge(c);
    challengeRef.current = c;
    setTimerKey(1);
  };

  const endSprint = () => setPhase('results');
  const restart  = () => { setPhase('ready'); setChallenge(null); setHistory([]); setScore(0); setTimerKey(0); setCanEnd(false); };

  // ── READY screen ────────────────────────────────────────────────
  if (phase === 'ready') return (
    <div style={{animation:'fadeIn .25s ease', maxWidth:520, margin:'0 auto'}}>
      <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:20,padding:'40px 32px',textAlign:'center'}}>
        <div style={{fontSize:64,marginBottom:12}}>⚡</div>
        <h2 style={{fontSize:24,fontWeight:900,color:C.textPrimary,marginBottom:8,letterSpacing:'-.5px'}}>Color Harmony Sprint</h2>
        <p style={{color:C.textSecondary,fontSize:14,lineHeight:1.7,maxWidth:340,margin:'0 auto 28px'}}>
          Answer random color challenges before the 10-second timer runs out.<br/>Complete at least 5 rounds to see your results.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:28,textAlign:'center'}}>
          {[['⚡','Complementary'],['🔗','Analogous'],['△','Triadic'],['□','Tetradic'],['🎯','Closest'],['🔍','Odd One Out']].map(([icon,name])=>(
            <div key={name} style={{background:C.bgSecondary,borderRadius:10,padding:'10px 6px',border:`1px solid ${C.border}`}}>
              <div style={{fontSize:20,marginBottom:4}}>{icon}</div>
              <div style={{fontSize:10,color:C.textMuted,letterSpacing:'.05em'}}>{name}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>
          <Btn onClick={startSprint} variant="primary" style={{minWidth:200,padding:'14px 24px',fontSize:15,fontWeight:700}}>START SPRINT</Btn>
          <div style={{fontSize:11,color:C.textMuted}}>+10 correct · −5 incorrect · 10s per challenge</div>
        </div>
      </div>
    </div>
  );

  // ── RESULTS screen ───────────────────────────────────────────────
  if (phase === 'results') {
    const total    = history.length;
    const correct  = history.filter(h=>h.correct).length;
    const accuracy = total ? Math.round((correct/total)*100) : 0;
    const avgTime  = total ? (history.reduce((s,h)=>s+h.time,0)/total).toFixed(1) : '–';
    const stars    = scoreToStars(accuracy);
    try { const prev = parseInt(localStorage.getItem('chromix-sprint-best')||'0'); if(score>prev) localStorage.setItem('chromix-sprint-best',String(score)); } catch {}

    return (
      <div style={{animation:'slideUp .3s ease',maxWidth:520,margin:'0 auto'}}>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:20,padding:'36px 28px',textAlign:'center'}}>
          <div style={{fontSize:52,marginBottom:8}}>🏆</div>
          <div style={{fontSize:52,fontWeight:900,color:C.textPrimary,fontFamily:'monospace',lineHeight:1}}>{score}</div>
          <div style={{fontSize:10,letterSpacing:'.15em',color:C.textMuted,marginTop:4,marginBottom:18}}>FINAL SCORE</div>

          {/* Stars */}
          <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:24}}>
            {Array.from({length:5},(_,i)=>(
              <span key={i} style={{fontSize:34,color:i<stars?'#ffd700':'rgba(255,255,255,.12)',filter:i<stars?'drop-shadow(0 0 7px #ffd700)':'none',animation:i<stars?`starPop .35s ${i*.1}s ease both`:'none',display:'inline-block'}}>{i<stars?'★':'☆'}</span>
            ))}
          </div>

          {/* Stats grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:24}}>
            {[
              ['🎯','Accuracy',`${accuracy}%`],
              ['📊','Challenges',`${total}`],
              ['✅','Correct',`${correct} / ${total}`],
              ['⏱','Avg Time',`${avgTime}s`],
            ].map(([icon,label,val])=>(
              <div key={label} style={{background:C.bgSecondary,borderRadius:12,padding:'14px 10px',border:`1px solid ${C.border}`}}>
                <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
                <div style={{fontSize:20,fontWeight:800,color:C.textPrimary,fontFamily:'monospace'}}>{val}</div>
                <div style={{fontSize:10,color:C.textMuted,letterSpacing:'.1em',marginTop:2}}>{label.toUpperCase()}</div>
              </div>
            ))}
          </div>

          {/* Type breakdown */}
          <div style={{marginBottom:24,textAlign:'left'}}>
            <div style={{fontSize:11,color:C.textMuted,letterSpacing:'.1em',marginBottom:8,paddingLeft:2}}>CHALLENGE BREAKDOWN</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {SPRINT_TYPES.map(type=>{
                const all=history.filter(h=>h.type===type);
                if(!all.length) return null;
                const ok=all.filter(h=>h.correct).length;
                const typeIcons={complementary:'⚡',analogous:'🔗',triadic:'△',tetradic:'□',pick_harmony:'🎨',find_closest:'🎯',odd_one_out:'🔍'};
                const typeNames={complementary:'Complementary',analogous:'Analogous',triadic:'Triadic',tetradic:'Tetradic',pick_harmony:'Pick Harmony',find_closest:'Find Closest',odd_one_out:'Odd One Out'};
                return(
                  <div key={type} style={{display:'flex',alignItems:'center',gap:8,background:C.bgSecondary,borderRadius:8,padding:'8px 12px',border:`1px solid ${C.border}`}}>
                    <span style={{fontSize:16}}>{typeIcons[type]}</span>
                    <span style={{flex:1,fontSize:12,color:C.textSecondary}}>{typeNames[type]}</span>
                    <span style={{fontFamily:'monospace',fontSize:12,color:ok===all.length?C.success:ok>0?C.warning:C.error,fontWeight:700}}>{ok}/{all.length}</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
            <Btn onClick={restart} variant="primary" style={{minWidth:150,padding:'12px 20px'}}>Play Again</Btn>
          </div>
        </div>
      </div>
    );
  }

  // ── PLAYING screen ───────────────────────────────────────────────
  const tc = timeLeft <= 3 ? C.error : timeLeft <= 6 ? C.warning : C.accent;
  const correct = history.filter(h=>h.correct).length;
  const accuracy = history.length ? Math.round((correct/history.length)*100) : 100;

  return (
    <div style={{maxWidth:520,margin:'0 auto',animation:'fadeIn .2s ease'}}>
      {/* HUD */}
      <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
        {/* Timer ring */}
        <div style={{position:'relative',width:52,height:52,flexShrink:0}}>
          <svg width="52" height="52" style={{transform:'rotate(-90deg)'}}>
            <circle cx="26" cy="26" r="22" fill="none" stroke={C.border} strokeWidth="4"/>
            <circle cx="26" cy="26" r="22" fill="none" stroke={tc} strokeWidth="4"
              strokeDasharray={`${2*Math.PI*22}`}
              strokeDashoffset={`${2*Math.PI*22*(1-timeLeft/10)}`}
              style={{transition:'stroke-dashoffset .9s linear,stroke .3s'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'monospace',fontSize:15,fontWeight:800,color:tc}}>{timeLeft}</div>
        </div>
        {/* Score + progress */}
        <div style={{flex:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{fontSize:11,color:C.textMuted,letterSpacing:'.1em'}}>CHALLENGE {history.length+1}</span>
            <span style={{fontFamily:'monospace',fontSize:16,fontWeight:800,color:C.accent}}>
              {score >= 0 ? '+' : ''}{score} pts
            </span>
          </div>
          <div style={{height:5,background:C.border,borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${accuracy}%`,background:`linear-gradient(90deg,${C.accent},${C.accentAlt})`,borderRadius:3,transition:'width .4s'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
            <span style={{fontSize:10,color:C.textMuted}}>{correct}/{history.length} correct</span>
            <span style={{fontSize:10,color:C.textMuted}}>{accuracy}% accuracy</span>
          </div>
        </div>
        {/* End button (only after MIN_CHALLENGES) */}
        {canEnd && (
          <Btn onClick={endSprint} variant="ghost" small style={{flexShrink:0,fontSize:11,padding:'6px 10px',opacity:.6}}>End →</Btn>
        )}
      </div>

      {/* Challenge card */}
      {challenge && (
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:16,padding:'18px 16px'}}>
          <SprintCard key={timerKey} challenge={challenge} onAnswer={handleAnswer} C={C}/>
        </div>
      )}

      {/* Min challenge hint */}
      {!canEnd && history.length > 0 && (
        <div style={{textAlign:'center',marginTop:10,fontSize:11,color:C.textMuted}}>
          {MIN_CHALLENGES - history.length} more to unlock results
        </div>
      )}
    </div>
  );
}
