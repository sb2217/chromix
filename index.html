// Level complete modal
function LevelCompleteModal({lv,avg,taskScores,onNext,onReplay,onBack,C}){
  const stars=scoreToStars(avg);
  const nextLv=HARMONY_LEVELS.find(l=>l.id===lv.id+1);
  const nextUnlocked=nextLv&&HarmonyStore.isUnlocked(nextLv.id);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',backdropFilter:'blur(10px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .2s ease'}}>
      <div style={{background:C.bgCard,border:`1px solid ${C.borderLight}`,borderRadius:20,padding:44,textAlign:'center',maxWidth:360,width:'90%',animation:'lcPop .35s cubic-bezier(.34,1.56,.64,1)'}}>
        <div style={{fontSize:62,marginBottom:10}}>🏆</div>
        <div style={{fontSize:26,fontWeight:900,letterSpacing:'-.5px',background:`linear-gradient(90deg,${C.accent},${C.accentAlt})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:18}}>
          Level Complete!
        </div>
        <div style={{fontFamily:'monospace',fontSize:54,fontWeight:900,color:C.textPrimary,lineHeight:1}}>{avg}%</div>
        <div style={{fontSize:10,letterSpacing:'.15em',color:C.textMuted,marginBottom:20,marginTop:4}}>AVERAGE SCORE</div>
        <div style={{display:'flex',justifyContent:'center',gap:5,marginBottom:22}}>
          {Array.from({length:5},(_,i)=>(
            <span key={i} style={{fontSize:34,color:i<stars?'#ffd700':'rgba(255,255,255,.12)',filter:i<stars?'drop-shadow(0 0 7px #ffd700)':'none',animation:i<stars?`starPop .35s ${i*0.1}s ease both`:'none',display:'inline-block'}}>{i<stars?'★':'☆'}</span>
          ))}
        </div>
        {avg>=80&&nextLv&&<div style={{background:`linear-gradient(135deg,${C.accent}22,${C.accentAlt}22)`,border:`1px solid ${C.accent}44`,borderRadius:12,padding:12,marginBottom:20,fontSize:13,color:C.accent}}>
          🎉 {nextLv.name} Unlocked!
        </div>}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {nextLv&&avg>=80&&<Btn onClick={onNext} variant="primary" style={{width:'100%',padding:14}}>CONTINUE →</Btn>}
          <Btn onClick={onReplay} variant="secondary" style={{width:'100%',padding:14}}>REPLAY LEVEL</Btn>
          <Btn onClick={onBack} variant="ghost" style={{width:'100%',padding:14}}>← Back to Levels</Btn>
        </div>
      </div>
    </div>
  );
}

// Saturation slider
function SatSlider({sat,setSat,baseHue,C}){
  return(
    <div style={{width:'100%',maxWidth:320}}>
      <div style={{fontSize:9,letterSpacing:'.13em',color:C.textMuted,marginBottom:7}}>YOUR SATURATION</div>
      <div style={{position:'relative',height:22,borderRadius:11,border:`1px solid ${C.borderLight}`,overflow:'hidden',cursor:'pointer',
        background:`linear-gradient(to right,hsl(${baseHue},0%,52%),hsl(${baseHue},100%,52%))`}}
        onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setSat(Math.round(Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100))))}}>
        <div style={{position:'absolute',top:'50%',left:`${sat}%`,transform:'translate(-50%,-50%)',width:24,height:24,borderRadius:'50%',background:'#fff',border:'3px solid rgba(255,255,255,.9)',boxShadow:'0 2px 10px rgba(0,0,0,.5)',pointerEvents:'none'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,fontFamily:'monospace',color:C.textMuted}}>
        <span>0%</span><span style={{color:C.accent,fontWeight:700}}>{sat}%</span><span>100%</span>
      </div>
    </div>
  );
}

function LevelMode(){
  const{C}=useTheme();
  const{s:cfg}=useSettings();
  const[selectedLevel,setSelectedLevel]=useState(null);
  const[taskIdx,setTaskIdx]=useState(0);
  const[phase,setPhase]=useState('playing'); // playing | submitted
  const[baseHue,setBaseHue]=useState(0);
  const[satTarget,setSatTarget]=useState(50);
  const[playerSat,setPlayerSat]=useState(50);
  const[taskScores,setTaskScores]=useState([]);
  const[markers,setMarkers]=useState([]);
  const[feedback,setFeedback]=useState(null);
  const[showModal,setShowModal]=useState(false);
  const[modalData,setModalData]=useState(null);
  const[,forceUpdate]=useState(0);

  // Build markers for current task
  const initTask=(lv,tIdx,bHue,sTarget)=>{
    const task=lv.tasks[tIdx];
    const sat=isSatMode(task.type);
    const startHues=[];
    for(let i=0;i<task.markerCount;i++)startHues.push(HarmonyMath.norm(bHue+180+i*20));
    const newMarkers=[{hue:bHue,isBase:true,draggable:false,label:`BASE ${Math.round(bHue)}°`}];
    startHues.forEach(h=>newMarkers.push({hue:h,draggable:true,label:`${Math.round(h)}°`}));
    setMarkers(newMarkers);
    setPhase('playing');
    setFeedback(null);
    setPlayerSat(50);
  };

  const startLevel=lv=>{
    const bHue=Math.random()*360;
    const sTarget=15+Math.random()*70;
    setSelectedLevel(lv);setTaskIdx(0);setTaskScores([]);
    setBaseHue(bHue);setSatTarget(sTarget);
    setShowModal(false);
    initTask(lv,0,bHue,sTarget);
  };

  const calcScore=useCallback(()=>{
    if(!selectedLevel)return 0;
    const task=selectedLevel.tasks[taskIdx];
    if(isSatMode(task.type)){
      if(task.type==='sat_max')   return HarmonyMath.satScore(playerSat,100,30);
      if(task.type==='sat_pastel')return HarmonyMath.satScore(playerSat,15,30);
      if(task.type==='sat_match') return HarmonyMath.satScore(playerSat,Math.round(satTarget),30);
      return 0;
    }
    const targets=getHarmonyTargets(task.type,baseHue);
    const playerHues=markers.filter(m=>m.draggable).map(m=>m.hue);
    if(!playerHues.length||!targets.length)return 0;
    let total=0;
    const count=Math.min(playerHues.length,targets.length);
    for(let i=0;i<count;i++)total+=HarmonyMath.hueScore(playerHues[i],targets[i].hue,targets[i].tol||30);
    return Math.round(total/count);
  },[selectedLevel,taskIdx,markers,playerSat,satTarget,baseHue]);

  const liveScore=useMemo(()=>phase==='playing'?calcScore():0,[calcScore,phase]);

  const handleMarkerMove=(idx,hue)=>{
    setMarkers(prev=>{const n=[...prev];n[idx]={...n[idx],hue,label:`${Math.round(hue)}°`};return n});
  };

  const submit=()=>{
    if(phase!=='playing')return;
    const score=calcScore();
    RatingStore.add(score,'Levels');
    const newScores=[...taskScores,score];
    setTaskScores(newScores);
    setPhase('submitted');
    const lbl=scoreToStars(score);
    const fbText=score>=95?'PERFECT!'  :score>=85?'EXCELLENT':score>=70?'GOOD':score>=50?'CLOSE':'TRY AGAIN';
    setFeedback({score,stars:lbl,text:fbText});
    if(cfg.soundEnabled){if(score>=95)AudioEngine.perfect();else if(score>=70)AudioEngine.good();else AudioEngine.fail()}

    const isLast=taskIdx===selectedLevel.tasks.length-1;
    if(isLast){
      const avg=HarmonyMath.avg(newScores);
      HarmonyStore.record(selectedLevel.id,avg);
      setTimeout(()=>{setModalData({lv:selectedLevel,avg,scores:newScores});setShowModal(true)},1200);
    }
  };

  const nextTask=()=>{
    if(!selectedLevel)return;
    if(taskIdx<selectedLevel.tasks.length-1){
      const next=taskIdx+1;
      const bHue=Math.random()*360;
      const sTarget=15+Math.random()*70;
      setTaskIdx(next);setBaseHue(bHue);setSatTarget(sTarget);
      initTask(selectedLevel,next,bHue,sTarget);
    }
  };

  // Always-fresh refs so keyboard handler never has stale closures
  const submitRef=useRef(submit);
  const nextTaskRef=useRef(nextTask);
  useEffect(()=>{submitRef.current=submit;},[submit]);
  useEffect(()=>{nextTaskRef.current=nextTask;},[nextTask]);

  // Keyboard: arrows nudge active marker
  useEffect(()=>{
    const handler=e=>{
      if(!selectedLevel)return;
      if(e.key==='Enter'||e.key===' '){e.preventDefault();if(phase==='playing')submitRef.current();else nextTaskRef.current();return}
      if(e.key==='n'||e.key==='N'){if(phase==='submitted')nextTaskRef.current();return}
      if(e.key==='r'||e.key==='R'){startLevel(selectedLevel);return}
      if(e.key==='ArrowLeft'){e.preventDefault();setMarkers(prev=>{const n=[...prev];const draggables=n.map((m,i)=>({m,i})).filter(x=>x.m.draggable);if(!draggables.length)return n;const idx=draggables[0].i;n[idx]={...n[idx],hue:HarmonyMath.norm(n[idx].hue-2),label:`${Math.round(HarmonyMath.norm(n[idx].hue-2))}°`};return n})}
      if(e.key==='ArrowRight'){e.preventDefault();setMarkers(prev=>{const n=[...prev];const draggables=n.map((m,i)=>({m,i})).filter(x=>x.m.draggable);if(!draggables.length)return n;const idx=draggables[0].i;n[idx]={...n[idx],hue:HarmonyMath.norm(n[idx].hue+2),label:`${Math.round(HarmonyMath.norm(n[idx].hue+2))}°`};return n})}
    };
    window.addEventListener('keydown',handler);return()=>window.removeEventListener('keydown',handler);
  },[selectedLevel,phase]);

  // ── Level select grid ──
  if(!selectedLevel){
    return<div style={{animation:'fadeIn .25s ease'}}>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:6,color:C.textPrimary}}>Harmony Levels</h2>
      <p style={{color:C.textSecondary,fontSize:13,lineHeight:1.7,maxWidth:520,marginBottom:24}}>
        Master color harmony relationships. Each level unlocks when you score ≥ 80%. Drag markers to the correct harmonic positions.
      </p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:13}}>
        {HARMONY_LEVELS.map(lv=>{
          const unlocked=HarmonyStore.isUnlocked(lv.id);
          const completed=HarmonyStore.isCompleted(lv.id);
          const best=HarmonyStore.getBest(lv.id);
          return<div key={lv.id} onClick={unlocked?()=>startLevel(lv):undefined}
            style={{background:C.bgCard,border:`1px solid ${completed?lv.color+'55':C.border}`,borderRadius:14,padding:20,cursor:unlocked?'pointer':'default',opacity:unlocked?1:.45,transition:'transform .15s,border-color .2s,box-shadow .15s',position:'relative',overflow:'hidden'}}
            onMouseEnter={e=>{if(unlocked){e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='0 8px 28px rgba(0,0,0,.3)'}}}
            onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none'}}>
            <div style={{fontSize:30,marginBottom:10}}>{lv.icon}</div>
            <div style={{fontSize:9,letterSpacing:'.15em',color:C.textMuted,marginBottom:5}}>LEVEL {lv.id}</div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:5,color:C.textPrimary}}>{lv.name}</div>
            <div style={{fontSize:12,color:C.textSecondary,lineHeight:1.6,marginBottom:12}}>{lv.desc}</div>
            <div style={{height:4,background:C.bgSecondary,borderRadius:2,overflow:'hidden',marginBottom:6}}>
              <div style={{height:'100%',width:`${best}%`,background:lv.color,borderRadius:2,transition:'width .4s ease'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,fontFamily:'monospace'}}>
              <span style={{color:C.textMuted}}>Best: {best}%</span>
              <span style={{color:C.textMuted}}>Need: 80%</span>
            </div>
            {!unlocked&&<div style={{position:'absolute',top:12,right:12,fontSize:10,background:'rgba(255,255,255,.07)',borderRadius:6,padding:'2px 7px',color:C.textMuted}}>🔒 Locked</div>}
            {completed&&<div style={{position:'absolute',top:12,right:12,fontSize:10,background:`${lv.color}22`,borderRadius:6,padding:'2px 7px',color:lv.color}}>✓ Done</div>}
            {/* Star display for best */}
            {best>0&&<div style={{marginTop:6}}>
              {Array.from({length:5},(_,i)=>(
                <span key={i} style={{fontSize:12,color:i<scoreToStars(best)?'#ffd700':'rgba(255,255,255,.12)',filter:i<scoreToStars(best)?'drop-shadow(0 0 3px #ffd700)':'none'}}>★</span>
              ))}
            </div>}
          </div>;
        })}
      </div>
      <Card style={{marginTop:24}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>LAST 3 RATINGS</div>
        <RatingHistoryStrip limit={3}/>
      </Card>
    </div>;
  }

  const task=selectedLevel.tasks[taskIdx];
  const targets=getHarmonyTargets(task.type,baseHue);
  const sat=isSatMode(task.type);
  const overlay=sat?null:getOverlayMode(task.type);
  const playerHues=markers.filter(m=>m.draggable).map(m=>m.hue);
  const scoreColor=['#ff5533','#ff9944','#ffcc44','#88ee44','#3dffa0'][Math.min(4,Math.floor(liveScore/20))];

  return<div style={{animation:'fadeIn .25s ease'}}>
    {showModal&&modalData&&<LevelCompleteModal
      lv={modalData.lv} avg={modalData.avg} taskScores={modalData.scores}
      onNext={()=>{const n=HARMONY_LEVELS.find(l=>l.id===modalData.lv.id+1);setShowModal(false);if(n&&HarmonyStore.isUnlocked(n.id))startLevel(n);else setSelectedLevel(null)}}
      onReplay={()=>{setShowModal(false);startLevel(selectedLevel)}}
      onBack={()=>{setShowModal(false);setSelectedLevel(null)}}
      C={C}
    />}
    <Btn onClick={()=>setSelectedLevel(null)} variant="ghost" small style={{marginBottom:16}}>← Back to Levels</Btn>
    <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:22,alignItems:'start'}}>
      {/* Wheel side */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
        <HueRingWheel baseHue={baseHue} markers={markers} onMarkerMove={handleMarkerMove} overlayMode={overlay} size={Math.min(300,cfg.wheelSize)}/>
        {/* Swatches */}
        <div style={{display:'flex',gap:8,width:'100%',maxWidth:300}}>
          <div style={{flex:1,height:52,borderRadius:10,background:`hsl(${Math.round(baseHue)},88%,55%)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,letterSpacing:'.15em',color:'#fff'}}>
            BASE {Math.round(baseHue)}°
          </div>
          {sat?(
            <div style={{flex:1,height:52,borderRadius:10,background:`hsl(${Math.round(baseHue)},${playerSat}%,55%)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,letterSpacing:'.15em',color:'#fff'}}>
              SAT {playerSat}%
            </div>
          ):(
            playerHues.length>0&&<div style={{flex:1,height:52,borderRadius:10,background:`hsl(${Math.round(playerHues[0])},88%,55%)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,letterSpacing:'.15em',color:'#fff'}}>
              YOURS {Math.round(playerHues[0])}°
            </div>
          )}
        </div>
        {sat&&<SatSlider sat={playerSat} setSat={setPlayerSat} baseHue={baseHue} C={C}/>}
      </div>

      {/* Side panel */}
      <div style={{display:'flex',flexDirection:'column',gap:14,minWidth:0}}>
        {/* Task card */}
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.accent}`,borderRadius:14,padding:18}}>
          <div style={{fontSize:9,letterSpacing:'.15em',color:C.accent,fontWeight:700,marginBottom:5}}>{selectedLevel.icon} {selectedLevel.name.toUpperCase()} — LEVEL {selectedLevel.id}</div>
          <div style={{fontSize:18,fontWeight:700,color:C.textPrimary,marginBottom:6}}>{task.title}</div>
          <div style={{fontSize:13,color:C.textSecondary,lineHeight:1.68,marginBottom:12}}>{task.desc}</div>
          {/* Progress pips */}
          <div style={{display:'flex',gap:4}}>
            {selectedLevel.tasks.map((_,i)=>(
              <div key={i} style={{width:20,height:4,borderRadius:2,background:i<taskIdx?C.accent:i===taskIdx?C.accentAlt:C.border}}/>
            ))}
          </div>
        </div>

        {/* Live values */}
        <Card>
          <div style={{color:C.textMuted,fontSize:9,letterSpacing:'.15em',marginBottom:8}}>LIVE VALUES</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
            <div style={{background:C.bgSecondary,borderRadius:10,padding:'9px 11px'}}>
              <div style={{fontSize:8,letterSpacing:'.13em',color:C.textMuted,marginBottom:3}}>BASE HUE</div>
              <div style={{fontFamily:'monospace',fontSize:17,fontWeight:700,color:C.accent}}>{Math.round(baseHue)}°</div>
            </div>
            <div style={{background:C.bgSecondary,borderRadius:10,padding:'9px 11px'}}>
              <div style={{fontSize:8,letterSpacing:'.13em',color:C.textMuted,marginBottom:3}}>{sat?'YOUR SAT':'YOUR HUE'}</div>
              <div style={{fontFamily:'monospace',fontSize:17,fontWeight:700,color:C.accentAlt}}>
                {sat?`${playerSat}%`:playerHues.length?`${Math.round(playerHues[0])}°`:'–'}
              </div>
            </div>
          </div>
          {/* Targets */}
          {targets.length>0&&<div>
            <div style={{fontSize:9,letterSpacing:'.13em',color:C.textMuted,marginBottom:5}}>TARGETS</div>
            {targets.map(t=>(
              <div key={t.label} style={{display:'inline-flex',alignItems:'center',gap:7,background:C.bgSecondary,borderRadius:7,padding:'4px 9px',fontSize:11,fontFamily:'monospace',marginRight:6,marginBottom:4}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:`hsl(${Math.round(t.hue)},88%,55%)`,flexShrink:0}}/>
                {t.label} = {Math.round(t.hue)}°
              </div>
            ))}
          </div>}
          {sat&&<div style={{fontSize:11,fontFamily:'monospace',color:C.textSecondary,marginTop:4}}>
            Target: {task.type==='sat_max'?'100% (vivid)':task.type==='sat_pastel'?'< 25% (pastel)':`${Math.round(satTarget)}%`}
          </div>}
        </Card>

        {/* Score bar */}
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:9,letterSpacing:'.13em',color:C.textMuted}}>ACCURACY</span>
            <span style={{fontFamily:'monospace',fontSize:13,fontWeight:700,color:scoreColor}}>{phase==='playing'?liveScore:feedback?.score}%</span>
          </div>
          <div style={{height:8,background:C.bgSecondary,borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${phase==='playing'?liveScore:feedback?.score||0}%`,background:`linear-gradient(90deg,${scoreColor}88,${scoreColor})`,borderRadius:4,transition:'width .1s,background .2s'}}/>
          </div>
        </Card>

        {/* Submit button */}
        {phase==='playing'?(
          <Btn onClick={submit} variant="primary" style={{padding:14,width:'100%'}}>SUBMIT ✓</Btn>
        ):(
          <Btn onClick={nextTask} variant="primary" style={{padding:14,width:'100%'}}>
            {taskIdx<selectedLevel.tasks.length-1?'NEXT TASK →':'FINISHING...'}
          </Btn>
        )}

        {/* Feedback */}
        {feedback&&<div style={{padding:11,borderRadius:10,fontWeight:700,letterSpacing:'.05em',textAlign:'center',animation:'fadeIn .28s ease',
          background:feedback.stars>=4?'rgba(61,255,160,.1)':feedback.stars===3?'rgba(124,111,255,.1)':feedback.stars===2?'rgba(255,204,68,.08)':'rgba(255,85,51,.08)',

  {key:'hue',title:'Understanding Hue',icon:'🌈',level:1,desc:'Hue is your position on the color wheel: 0°=Red, 60°=Yellow, 120°=Green, 180°=Cyan, 240°=Blue, 300°=Magenta.',challenge:'Drag the outer ring to approximately 120° (green).',check:c=>Math.abs(c.h-120)<18&&c.s>50,success:'Correct! 120° is the green primary — the triadic partner of red and blue.',hint:'Drag the outer ring handle to the right side of the wheel.'},

function LearnMode(){
  const{C}=useTheme();
  const{s:cfg}=useSettings();
  const[active,setActive]=useState(null);
  const[color,setColor]=useState({h:0,s:75,l:50});
  const[completed,setCompleted]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('chromix-learn')||'[]'))}catch{return new Set()}});
  const[phase,setPhase]=useState('intro');
  const[feedback,setFeedback]=useState('');
  const[lastScore,setLastScore]=useState(null);
  const saveCompleted=c=>{try{localStorage.setItem('chromix-learn',JSON.stringify([...c]))}catch{}};

  const mod=active!==null?MODULES[active]:null;
  const check=()=>{
    if(!mod)return;
    if(mod.check(color)){
      const n=new Set([...completed,mod.key]);setCompleted(n);saveCompleted(n);setPhase('done');setFeedback(mod.success);
      const score=90+Math.round(Math.random()*10);setLastScore(score);
      RatingStore.add(score,'Learn');
      if(cfg.soundEnabled)AudioEngine.levelUp();
    }else setFeedback(mod.hint);
  };

  if(active===null){
    const byLevel=[1,2,3,4].map(l=>MODULES.filter(m=>m.level===l));
    return<div style={{animation:'fadeIn .25s ease'}}>
      <div style={{color:C.textMuted,fontSize:12,marginBottom:20}}>
        {completed.size}/{MODULES.length} concepts mastered
        <div style={{height:3,background:C.border,borderRadius:2,marginTop:6,maxWidth:200}}>
          <div style={{height:'100%',width:`${(completed.size/MODULES.length)*100}%`,background:`linear-gradient(90deg,${C.accent},${C.accentAlt})`,borderRadius:2,transition:'width .4s'}}/>
        </div>
      </div>
      {byLevel.map((mods,li)=>(
        <div key={li} style={{marginBottom:24}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:3,marginBottom:10}}>LEVEL {li+1}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:10}}>
            {mods.map(m=>{
              const idx=MODULES.findIndex(x=>x.key===m.key);
              const done=completed.has(m.key);
              return<button key={m.key} onClick={()=>{setActive(idx);setPhase('intro');setColor({h:0,s:75,l:50});setFeedback('');setLastScore(null)}}
                onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}
                style={{background:done?C.bgSecondary:C.bgCard,border:`1px solid ${done?C.success+'44':C.border}`,borderRadius:12,padding:16,textAlign:'left',cursor:'pointer',transition:'transform .15s',fontFamily:'inherit'}}>
                <div style={{fontSize:22,marginBottom:6}}>{m.icon}</div>
                <div style={{color:done?C.success:C.textPrimary,fontWeight:600,fontSize:13}}>{m.title}</div>
                {done&&<div style={{color:C.success,fontSize:10,marginTop:4}}>✓ Mastered</div>}
              </button>;
            })}
          </div>
        </div>
      ))}
      <Card style={{marginTop:16}}>
        <div style={{color:C.textMuted,fontSize:9,letterSpacing:2,marginBottom:10}}>LAST 3 RATINGS</div>
        <RatingHistoryStrip limit={3}/>
      </Card>
    </div>;
  }

  const ratio=contrastRatio(hslToRgb(color.h,color.s,color.l),{r:255,g:255,b:255});
  const wl=wcagLevel(ratio);
  return<div style={{animation:'fadeIn .25s ease'}}>
    <Btn onClick={()=>setActive(null)} variant="ghost" small>← Back</Btn>
    <div style={{display:'flex',gap:24,alignItems:'flex-start',flexWrap:'wrap',marginTop:16}}>
      <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center',width:'min(100%,320px)',flexShrink:0}}>
        <ColorWheel color={color} onChange={setColor} locked={phase==='done'} size={Math.min(300,cfg.wheelSize)}/>
        <div style={{width:'100%',maxWidth:300,height:52,borderRadius:10,background:`hsl(${color.h},${color.s}%,${color.l}%)`,transition:'background .06s',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{color:color.l>55?'#111':'#fff',fontFamily:'monospace',fontSize:11}}>H:{Math.round(color.h)}° S:{Math.round(color.s)}% L:{Math.round(color.l)}%</span>
        </div>
        {mod.key==='wcag'&&<div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:10,padding:10,width:'100%',maxWidth:300,fontSize:11,fontFamily:'monospace'}}>
          <div style={{color:C.textMuted,marginBottom:4}}>Contrast vs white:</div>
          <div style={{color:wl.color,fontWeight:700,fontSize:14}}>{ratio.toFixed(2)}:1 — {wl.level}</div>
        </div>}
      </div>
      <div style={{flex:1,minWidth:220,maxWidth:360}}>
        <div style={{fontSize:26,marginBottom:6}}>{mod.icon}</div>
        <h2 style={{color:C.textPrimary,marginBottom:10,fontSize:18}}>{mod.title}</h2>
        <p style={{color:C.textSecondary,fontSize:13,lineHeight:1.75,marginBottom:18}}>{mod.desc}</p>
        {phase!=='done'?(
          <>
            <Card style={{marginBottom:14}}>
              <div style={{color:C.accent,fontSize:10,letterSpacing:2,marginBottom:6}}>CHALLENGE</div>
              <p style={{color:C.textSecondary,fontSize:13,margin:0,lineHeight:1.6}}>{mod.challenge}</p>
            </Card>
            {feedback&&<div style={{background:C.bgSecondary,border:`1px solid ${C.warning}44`,borderRadius:8,padding:10,marginBottom:12}}>
              <p style={{color:C.warning,fontSize:12,margin:0}}>💡 {feedback}</p>
            </div>}
            <Btn onClick={check}>CHECK ✓</Btn>
          </>
        ):(
          <div>
            <div style={{background:C.bgSecondary,border:`1px solid ${C.success}44`,borderRadius:10,padding:14,marginBottom:16}}>
              <div style={{color:C.success,fontSize:10,letterSpacing:2,marginBottom:8}}>✓ MASTERED</div>
              <p style={{color:C.success,fontSize:13,margin:0,lineHeight:1.6,marginBottom:12}}>{feedback}</p>
              {lastScore&&<StarRating score={lastScore} mode="Learn"/>}
            </div>
            <Btn onClick={()=>setActive(null)} variant="secondary">← Back to Modules</Btn>
          </div>
        )}
      </div>
    </div>
  </div>;
}

function BrandPsychologyTab(){
  const{C}=useTheme();

  const[altMode,setAltMode]=useState(false);
  const[hovered,setHovered]=useState(null);

  if(active!==null){
    const brand=BRANDS[active];

            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {brand.emotions.map(e=><Badge key={e}

          <p style={{color:C.textPrimary,fontSize:14,fontWeight:600,margin:0}}>{brand.primary}</p>

        <Card style={{borderColor:`${brandColor}22`}}>

              border:`1px solid ${isHov?bColor+'55':C.border}`,

              transition:'all .2s ease',fontFamily:'inherit',padding:0,
              transform:isHov?'translateY(-4px) scale(1.02)':'translateY(0) scale(1)',

            }}>

            {/* Logo zone — diagonal gradient using brand color */}
            <div style={{
              height:110,
              background:`linear-gradient(145deg,${bColor} 0%,${bColor}bb 60%,${bColor}66 100%)`,
              display:'flex',alignItems:'center',justifyContent:'center',
              position:'relative',overflow:'hidden',
            }}>
              {/* Subtle diagonal shimmer */}
              <div style={{position:'absolute',top:-20,right:-20,width:80,height:80,
                background:'rgba(255,255,255,0.08)',borderRadius:'50%',pointerEvents:'none'}}/>
              <BrandLogo brand={b} size={48} colorOverride="#fff"/>
            </div>

            {/* Info zone */}
            <div style={{padding:'12px 14px 14px'}}>
              <div style={{color:C.textPrimary,fontWeight:800,fontSize:14,marginBottom:3,letterSpacing:'-.2px'}}>{b.name}</div>
              <div style={{color:C.textMuted,fontSize:10,letterSpacing:'.08em',marginBottom:8}}>{b.industry.toUpperCase()}</div>
              {/* Color chip row */}
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:14,height:14,borderRadius:4,background:bColor,flexShrink:0,
                  boxShadow:`0 0 6px ${bColor}66`}}/>
                <span style={{fontFamily:'monospace',fontSize:10,color:C.textSecondary}}>{b.hex}</span>
              </div>
            </div>
          </button>
        );
      })}
    </div>
  </div>;
}

            <div style={{color:C.textSecondary}}>HSL: {Math.round(sandboxColor.h)}° {Math.round(sandboxColor.s)}% {Math.round(sandboxColor.l)}%</div>
            <div style={{color:C.textSecondary}}>RGB: {rgb.r}, {rgb.g}, {rgb.b}</div>
            <div style={{color:C.textSecondary}}>HEX: {rgbToHex(rgb)}</div>
            <div style={{color:C.textSecondary}}>Lab: L{lab.L.toFixed(1)} a{lab.a.toFixed(1)} b{lab.b.toFixed(1)}</div>
          </Card>
          <Card style={{marginBottom:12}}>
            <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>CONTRAST RATIOS</div>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1,background:'#fff',borderRadius:8,padding:10,textAlign:'center'}}><div style={{color:wcagLevel(wr).color,fontWeight:700,fontFamily:'monospace'}}>{wr.toFixed(1)}:1</div><div style={{color:'#888',fontSize:10}}>{wcagLevel(wr).level}</div></div>
              <div style={{flex:1,background:'#111',borderRadius:8,padding:10,textAlign:'center'}}><div style={{color:wcagLevel(br).color,fontWeight:700,fontFamily:'monospace'}}>{br.toFixed(1)}:1</div><div style={{color:'#666',fontSize:10}}>{wcagLevel(br).level}</div></div>
            </div>
          </Card>
          <div style={{display:'flex',gap:8}}>
            <Btn onClick={()=>exportPalette([sandboxColor],'json')} variant="ghost" small>⬇ JSON</Btn>
            <Btn onClick={()=>exportPalette([sandboxColor],'css')} variant="ghost" small>⬇ CSS</Btn>
          </div>
        </div>
      </div>
    )}
  </div>;
}

// ═══════════════════════════════════════════════════════════════════
//  SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════════
function SettingsPanel({onClose,C}){
  const{s,update}=useSettings();
  const sliders=[
    {key:'wheelSize',label:'Wheel Size',min:200,max:380,step:10},
    {key:'ringThicknessRatio',label:'Ring Thickness',min:.06,max:.22,step:.005},
    {key:'triRadiusRatio',label:'Triangle Size',min:.2,max:.42,step:.005},
    {key:'sensitivity',label:'Drag Sensitivity',min:.3,max:2.5,step:.1},
  ];
  return<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .2s ease'}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:18,padding:28,width:'min(90vw,440px)',maxHeight:'85vh',overflow:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <span style={{fontWeight:700,fontSize:16,color:C.textPrimary}}>⚙ Settings</span>
        <Btn onClick={onClose} variant="ghost" small>✕ Close [ESC]</Btn>
      </div>
      {sliders.map(({key,label,min,max,step})=>(
        <div key={key} style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{color:C.textSecondary,fontSize:13}}>{label}</span>
            <span style={{color:C.accent,fontFamily:'monospace',fontSize:12}}>{s[key]}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={s[key]} onChange={e=>update({[key]:+e.target.value})}/>
        </div>
      ))}
      <div style={{marginBottom:16}}>
        <span style={{color:C.textSecondary,fontSize:13,display:'block',marginBottom:8}}>Scoring Strictness</span>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['relaxed','standard','strict','wcag'].map(v=>(
            <Btn key={v} onClick={()=>update({scoringStrictness:v})} variant={s.scoringStrictness===v?'primary':'ghost'} small>{v}</Btn>
          ))}
        </div>
      </div>
      <Toggle on={s.precisionMode} onToggle={()=>update({precisionMode:!s.precisionMode})} label="Precision Mode (live HSL + Lab + ΔE)" C={C}/>
      <Toggle on={s.soundEnabled} onToggle={()=>{update({soundEnabled:!s.soundEnabled});if(!s.soundEnabled)AudioEngine.click()}} label="Sound Feedback" C={C}/>
      <div style={{borderTop:`1px solid ${C.border}`,marginTop:16,paddingTop:16,display:'flex',gap:8,flexWrap:'wrap'}}>
        <Btn onClick={()=>update({wheelSize:300,ringThicknessRatio:.115,triRadiusRatio:.315,sensitivity:1.0,scoringStrictness:'standard'})} variant="ghost" small>↺ Reset Defaults</Btn>
        <Btn onClick={()=>{if(confirm('Clear all progress, history, and settings?')){localStorage.clear();window.location.reload()}}} variant="danger" small>⚠ Clear All Data</Btn>
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════════════
//  APP SHELL
// ═══════════════════════════════════════════════════════════════════
const TABS=[
  {id:'game',   icon:'🎯',label:'Classic'},
  {id:'sprint', icon:'⏱',label:'Sprint'},
  {id:'levels', icon:'🏆',label:'Levels'},
  {id:'learn',  icon:'📚',label:'Learn'},
  {id:'explore',icon:'🌈',label:'Explore'},
  {id:'brands', icon:'🏢',label:'Brands'},
  {id:'guide',  icon:'❓',label:'Guide'},
];

function AppShell(){
  const{theme,C,cycleTheme}=useTheme();
  const{s}=useSettings();
  const[tab,setTab]=useState('levels');
  const[showSettings,setShowSettings]=useState(false);

  useEffect(()=>{
    const handler=e=>{if(e.key==='Escape')setShowSettings(false)};
    window.addEventListener('keydown',handler);return()=>window.removeEventListener('keydown',handler);
  },[]);

  return<div style={{minHeight:'100vh',background:'transparent',color:C.textPrimary,fontFamily:"'Syne',system-ui,sans-serif"}}>
    {/* Header */}
    <header style={{borderBottom:`1px solid ${C.border}`,padding:'10px clamp(12px,3vw,20px)',display:'flex',flexWrap:'wrap',gap:8,justifyContent:'space-between',alignItems:'center',background:C.bgCard,position:'sticky',top:0,zIndex:50,backdropFilter:'blur(16px)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:22,display:'inline-block',animation:'spin 18s linear infinite',color:C.accent,lineHeight:1}}>◉</span>
        <span style={{fontWeight:800,fontSize:'clamp(14px,3vw,18px)',letterSpacing:-.5}}>
          Chro<span style={{color:C.accent}}>mix</span>
          <sup style={{fontSize:9,color:C.textMuted,marginLeft:4,letterSpacing:1}}>v1</sup>
        </span>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
        {s.precisionMode&&<span style={{fontSize:9,letterSpacing:1,color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:4,padding:'2px 6px'}}>PRECISION</span>}
        {s.soundEnabled&&<span title="Sound enabled" style={{fontSize:13}}>🔊</span>}
        <Btn onClick={()=>setShowSettings(true)} variant="ghost" small title="Settings">⚙</Btn>
        <Btn onClick={cycleTheme} variant="ghost" small title={`Theme: ${theme}`}>{THEME_ICONS[theme]}</Btn>
      </div>
    </header>
    {/* Tab Nav */}
    <nav style={{display:'flex',borderBottom:`1px solid ${C.border}`,padding:'0 clamp(8px,2vw,16px)',background:C.bgSecondary,overflowX:'auto'}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)}
          style={{padding:'12px clamp(10px,2vw,16px)',background:'none',border:'none',borderBottom:`2px solid ${tab===t.id?C.accent:'transparent'}`,color:tab===t.id?C.textPrimary:C.textSecondary,fontSize:13,cursor:'pointer',transition:'color .2s,border-color .2s',display:'flex',alignItems:'center',gap:6,flexShrink:0,fontFamily:'inherit',fontWeight:tab===t.id?700:400}}>
          <span>{t.icon}</span>
          <span className="tab-label">{t.label}</span>
        </button>
      ))}
    </nav>
    {/* Main Content */}
    <main key={tab} style={{maxWidth:980,margin:'0 auto',padding:'clamp(16px,4vw,28px) clamp(10px,3vw,18px)',animation:'fadeIn .22s ease'}}>
      {tab==='game'   &&<GameMode/>}
      {tab==='sprint' &&<SprintMode/>}
      {tab==='levels' &&<LevelMode/>}
      {tab==='learn'  &&<LearnMode/>}
      {tab==='explore'&&<ExploreMode/>}
      {tab==='brands' &&<BrandPsychologyTab/>}
      {tab==='guide'  &&<HelpGuideTab/>}
    </main>
    {/* Footer */}
    <footer style={{textAlign:'center',padding:'20px',color:C.textMuted,fontSize:9,letterSpacing:2,borderTop:`1px solid ${C.border}`}}>
      CHROMIX · CIE ΔE₂₀₀₀ · WCAG 2.1 · COLOR HARMONY ENGINE · PERCEPTUALLY UNIFORM
    </footer>
    {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} C={C}/>}
  </div>;
}

// ═══════════════════════════════════════════════════════════════════
//  ROOT
// ═══════════════════════════════════════════════════════════════════
function App(){
  return<ThemeProvider>
    <SettingsProvider>
      <AppShell/>
    </SettingsProvider>
  </ThemeProvider>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
